<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="favicon.png" type="image/png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личный кабинет</title>

<style>
html, body {
    height: 100%;
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #1e2a38;
    color: #fff;
    display: flex;
    flex-direction: column;
}

/* HEADER */
header {
    background-color: #1e2a38;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
}

header h1 {
    margin: 0;
    font-size: 22px;
}

/* MENU */
.menu-button {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
}

.menu-button span {
    width: 30px;
    height: 4px;
    background: #fff;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
    margin: 0;
    padding: 0;
}

nav a {
    color: #fff;
    text-decoration: none;
}

nav a:hover {
    color: #FFD700;
}

/* MENU PANEL */
.menu-panel {
    position: absolute;
    top: -100%;
    left: 0;
    width: 100%;
    background: #1e2a38;
    padding: 60px 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    transition: 0.3s;
}

.menu-panel.active {
    top: 0;
}

/* MAIN */
main {
    padding: 40px;
    flex: 1;
}

main h2 {
    text-align: center;
    color: #FFD700;
    font-size: 28px;
    margin-bottom: 25px;
}

/* CARD */
.request-card {
    background: linear-gradient(145deg, rgba(31,49,69,0.98), rgba(18,26,38,0.98));
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 18px;
    box-shadow: 0 12px 35px rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
    transition: 0.25s;
}

.request-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 18px 50px rgba(0,0,0,0.6);
}

.request-card h3 {
    color: #FFD700;
    margin-bottom: 14px;
    font-size: 22px;
}

.request-card p {
    font-size: 16px;
    color: rgba(255,255,255,0.9);
    margin: 6px 0;
    line-height: 1.6;
    display: flex;
    gap: 8px;
}

/* STATUS */
.status-badge {
    position: absolute;
    top: 15px;
    right: 15px;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: bold;
}

.status-new { background: #3498db; }
.status-work { background: #f39c12; }
.status-done { background: #2ecc71; }

/* ITEMS */
.items-list {
    display: flex;
    gap: 12px;
    margin-top: 14px;
    overflow-x: auto;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.08);
}

.item img {
    width: 90px;
    height: 90px;
    border-radius: 12px;
    object-fit: cover;
}

/* EMPTY */
.empty {
    text-align: center;
    opacity: 0.7;
    margin-top: 40px;
    font-size: 18px;
}

/* FOOTER */
footer {
    background: #000;
    text-align: center;
    padding: 15px;
}

/* MOBILE */
@media (max-width: 768px) {
    nav ul { display: none; }
    .menu-button { display: flex; }
}
</style>
</head>

<body>

<header>
    <h1>Личный кабинет</h1>

    <div class="menu-button" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="submit_request.html">Подача заявки</a></li>
            <li><a href="#" onclick="logout()">Выйти</a></li>
        </ul>
    </nav>
</header>

<div class="menu-panel">
    <a href="index.html">Главная</a>
    <a href="submit_request.html">Подача заявки</a>
    <a href="#" onclick="logout()">Выйти</a>
</div>

<main>
    <h2>Мои заявки</h2>
    <div class="request-container"></div>
</main>

<footer>
    <p>&copy; 2026 МКУ "Кировсвет". Все права защищены.</p>
</footer>

<script>

async function loadRequests() {
    try {
        const response = await fetch('requests_all.json');
        if (!response.ok) throw new Error();
        return await response.json();
    } catch (e) {
        return [];
    }
}

async function displayRequests() {
    const requests = await loadRequests();

    const user = sessionStorage.getItem('username');
    const userRequests = requests.filter(r => r.username === user);

    const container = document.querySelector('.request-container');
    container.innerHTML = '';

    if (userRequests.length === 0) {
        container.innerHTML = `<div class="empty">У вас пока нет заявок</div>`;
        return;
    }

    userRequests.forEach(request => {

        let itemsText = request.items
            ? request.items.map(i => `${i.name} (${i.qty || 1})`).join(', ')
            : '-';

        let typeName =
            request.type === 'both'
                ? 'Установка столбов и светильников'
                : request.type === 'repair'
                ? 'Ремонт сетей'
                : request.type;

        let createdAt = new Date(request.createdAt);
        let expectedCallTime = new Date(request.expectedCallTime);

        let statusClass = 'status-new';
        if (request.status === 'В работе') statusClass = 'status-work';
        if (request.status === 'Завершена') statusClass = 'status-done';

        const card = document.createElement('div');
        card.classList.add('request-card');

        card.innerHTML = `
            <div class="status-badge ${statusClass}">
                ${request.status || 'Новая'}
            </div>

            <h3>${typeName}</h3>

            <p>📅 ${createdAt.toLocaleString()}</p>
            <p>👤 ${request.firstname} ${request.lastname}</p>
            <p>📞 ${request.phone}</p>
            <p>📍 ${request.address}</p>

            <p>🛠 ${itemsText}</p>
            <p>⏳ ${expectedCallTime.toLocaleString()}</p>

            <div class="items-list">
                ${request.items.map(item => `
                    <div class="item">
                        <img src="${item.img}" alt="${item.name}">
                    </div>
                `).join('')}
            </div>
        `;

        container.appendChild(card);
    });
}

function toggleMenu() {
    document.querySelector('.menu-panel').classList.toggle('active');
}

function logout() {
    sessionStorage.removeItem('username');
    window.location.href = 'index.html';
}

displayRequests();

</script>

</body>
</html>
