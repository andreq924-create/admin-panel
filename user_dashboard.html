<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личный кабинет</title>

<style>
/* ОСНОВА */
html, body {
    height: 100%;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e2a38, #2f3f52);
    color: #fff;
    display: flex;
    flex-direction: column;
}

/* HEADER */
header {
    background-color: #1e2a38;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    margin: 0;
    font-size: 22px;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
    margin: 0;
}

nav a {
    color: #fff;
    text-decoration: none;
    transition: 0.2s;
}

nav a:hover {
    color: #FFD700;
}

/* MAIN */
main {
    padding: 40px;
    flex: 1;
}

main h2 {
    margin-bottom: 20px;
    color: #FFD700;
}

/* ТАБЛИЦА (контрастная, мягкая) */
table {
    width: 100%;
    border-collapse: collapse;
    background: #1f3145; /* мягкий тёмно-синий фон */
    color: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

thead {
    background-color: #1e2a38; /* темнее заголовок */
    color: #FFD700;            /* золотой заголовок */
}

th, td {
    padding: 12px 10px;
    text-align: left;
    vertical-align: top;
}

tbody tr:nth-child(even) {
    background-color: #25394e; /* светлая полоса */
}

tbody tr:nth-child(odd) {
    background-color: #1f3145; /* основной цвет */
}

tbody tr:hover {
    background-color: #3a5a7a; /* светлый синий при наведении */
    transition: 0.2s;
}

/* FOOTER */
footer {
    background: #000;
    text-align: center;
    padding: 15px;
    font-size: 14px;
}
</style>

</head>
<body>

<header>
    <h1>Личный кабинет</h1>
    <nav>
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="submit_request.html">Подача заявки</a></li>
            <li><a href="#" onclick="logout()">Выйти</a></li>
        </ul>
    </nav>
</header>

<main>
    <h2>Мои заявки</h2>

    <table id="requestsTable">
        <thead>
            <tr>
                <th>Дата</th>
                <th>Тип заявки</th>
                <th>Выбранные предметы / Описание проблемы</th>
                <th>Дата завершения</th>
                <th>Статус</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</main>

<footer>
    <p>&copy; 2026 МКУ "Кировсвет". Все права защищены.</p>
</footer>

<script>
// Проверка, вошёл ли пользователь
if (!sessionStorage.getItem('username')) {
    alert('Вы не вошли в систему. Пожалуйста, авторизуйтесь.');
    window.location.href = 'login.html';
} else {
    displayRequests();
}

// Отображение заявок
function displayRequests() {
    const storedRequests = JSON.parse(localStorage.getItem('requests')) || [];
    const userRequests = storedRequests.filter(request => request.username === sessionStorage.getItem('username'));

    const tbody = document.getElementById('requestsTable').getElementsByTagName('tbody')[0];
    tbody.innerHTML = '';

    userRequests.forEach(request => {
        const row = tbody.insertRow();

        // Определяем, что выводить в колонке "Выбранные предметы / Описание проблемы"
        let itemsText = '-';
        if(request.type === 'repair' && request.problemDescription) {
            itemsText = request.problemDescription;
        } else if(request.items && request.items.length > 0) {
            itemsText = request.items.map(i => `${i.name} (${i.qty || 1} шт)`).join(', ');
        }

        // Красивое отображение типа работы
        let typeName = '';
        if(request.type === 'both') typeName = 'Установка столбов и светильников';
        else if(request.type === 'repair') typeName = 'Ремонт повреждения электрических сетей';
        else typeName = request.type || '-';

        row.insertCell(0).textContent = request.date || '-';
        row.insertCell(1).textContent = typeName;
        row.insertCell(2).textContent = itemsText;
        row.insertCell(3).textContent = request.expectedCallTime
            ? new Date(request.expectedCallTime).toLocaleString()
            : '-';
        row.insertCell(4).textContent = request.status || 'Новая';
    });
}

// Выход
function logout() {
    sessionStorage.removeItem('username');
    alert('Вы вышли из системы.');
    window.location.href = 'index.html';
}
</script>

</body>
</html>
