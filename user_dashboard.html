<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <style>
        /* ОСНОВА */
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #1e2a38; /* Однородный темный фон */
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            background-color: #1e2a38;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: relative;
            z-index: 10; /* Обеспечивает, чтобы шапка была сверху */
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        /* Кнопка меню */
        .menu-button {
            display: none;
            cursor: pointer;
            flex-direction: column;
            gap: 5px;
            width: 30px;
            height: 30px;
            justify-content: space-between;
        }

        .menu-button span {
            width: 30px;
            height: 4px;
            background-color: #fff;
        }

        nav {
            display: flex;
            gap: 20px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            transition: 0.2s;
        }

        nav a:hover {
            color: #FFD700;
        }

        /* Панель меню сверху */
        .menu-panel {
            position: absolute;
            top: -100%; /* Начальное скрытое положение меню (выше экрана) */
            left: 0;
            width: 100%;
            background-color: #1e2a38;
            height: auto;
            padding: 60px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            transition: top 0.3s ease-in-out; /* Плавное появление */
            z-index: 5;
            overflow: hidden;
            max-height: 80vh;
        }

        .menu-panel a {
            color: #fff; /* Устанавливаем белый цвет для текста */
            font-size: 18px;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .menu-panel a:hover {
            color: #FFD700; /* Цвет при наведении */
        }

        .menu-panel.active {
            top: 0; /* При активации панель спускается */
        }

        /* MAIN */
        main {
            padding: 40px;
            flex: 1;
            transition: margin-top 0.3s ease; /* Плавное движение контента */
        }

        main h2 {
            margin-bottom: 20px;
            color: #FFD700;
            font-size: 24px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* КАРТОЧКИ (для мобильных) */
        .request-card {
            background-color: #1f3145;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: block;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .request-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .request-card h3 {
            margin: 0 0 10px;
            color: #FFD700;
            font-size: 18px;
            text-transform: uppercase;
        }

        .request-card p {
            margin: 5px 0;
            color: #fff;
            font-size: 14px;
        }

        /* Обертка для карточек с прокруткой */
        .request-container {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
            padding-left: 15px;
            padding-bottom: 10px;
            border-radius: 10px;
            background-color: #1f3145;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        /* FOOTER */
        footer {
            background: #000;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }

        /* Адаптивность для мобильных */
        @media (max-width: 768px) {
            .request-card {
                padding: 15px;
                margin-bottom: 15px;
            }

            header h1 {
                font-size: 16px;
            }

            nav ul {
                gap: 10px;
                justify-content: center;
                padding: 10px 0;
            }

            footer p {
                font-size: 12px;
            }

            .menu-button {
                display: flex;
            }

            nav {
                display: none;
            }

            .menu-panel {
                top: -100%; /* Мобильное меню скрыто за экраном */
            }

            .menu-panel.active {
                top: 0; /* Панель открывается сверху */
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 14px;
            }

            nav ul {
                flex-direction: column;
                align-items: flex-start;
            }

            .request-card p {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Личный кабинет</h1>
    <div class="menu-button" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <nav>
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="submit_request.html">Подача заявки</a></li>
            <li><a href="#" onclick="logout()">Выйти</a></li>
        </ul>
    </nav>
</header>

<div class="menu-panel">
    <a href="index.html">Главная</a>
    <a href="submit_request.html">Подача заявки</a>
    <a href="#" onclick="logout()">Выйти</a>
</div>

<main>
    <h2>Мои заявки</h2>

    <div class="request-container">
        <!-- Здесь будут отображаться карточки заявок -->
    </div>

</main>

<footer>
    <p>&copy; 2026 МКУ "Кировсвет". Все права защищены.</p>
</footer>

<script>
    // Пример данных о заявках
    const exampleRequests = [
        {
            username: '111',
            date: '2026-03-01',
            type: 'repair',
            problemDescription: 'Поломка светильника на улице, не работает.',
            expectedCallTime: '2026-03-05T10:00:00',
            status: 'В работе',
            items: [{ name: 'Светильник', qty: 1 }]
        },
        {
            username: '111',
            date: '2026-03-02',
            type: 'repair',
            problemDescription: 'Повреждение кабеля в подземной сети, требуется восстановление.',
            expectedCallTime: '2026-03-10T14:00:00',
            status: 'Ожидает выполнения',
            items: [{ name: 'Кабель', qty: 2 }]
        }
    ];

    // Загрузка заявок
    async function loadRequests() {
        try {
            // Возвращаем наши примеры заявок
            return exampleRequests;
        } catch (error) {
            console.error('Fetch error:', error);
            alert('Ошибка при загрузке данных. Проверьте консоль для подробностей.');
            return [];
        }
    }

    // Отображение заявок
    async function displayRequests() {
        const requests = await loadRequests();
        const userRequests = requests.filter(request => request.username === sessionStorage.getItem('username'));

        const container = document.querySelector('.request-container');
        container.innerHTML = '';  // Очищаем контейнер

        userRequests.forEach(request => {
            const requestCard = document.createElement('div');
            requestCard.classList.add('request-card');

            let itemsText = '-';
            if(request.type === 'repair' && request.problemDescription) {
                itemsText = request.problemDescription;
            } else if(request.items && request.items.length > 0) {
                itemsText = request.items.map(i => `${i.name} (${i.qty || 1} шт)`).join(', ');
            }

            let typeName = '';
            if(request.type === 'both') typeName = 'Установка столбов и светильников';
            else if(request.type === 'repair') typeName = 'Ремонт повреждения электрических сетей';
            else typeName = request.type || '-';

            requestCard.innerHTML = `
                <h3>Тип заявки: ${typeName}</h3>
                <p><strong>Дата:</strong> ${request.date || '-'}</p>
                <p><strong>Описание:</strong> ${itemsText}</p>
                <p><strong>Дата завершения:</strong> ${request.expectedCallTime ? new Date(request.expectedCallTime).toLocaleString() : '-'}</p>
                <p><strong>Статус:</strong> ${request.status || 'Новая'}</p>
            `;

            container.appendChild(requestCard);
        });
    }

    // Выход
    function logout() {
        sessionStorage.removeItem('username');
        alert('Вы вышли из системы.');
        window.location.href = 'index.html';
    }

    // Функция для переключения меню
    function toggleMenu() {
        const menuPanel = document.querySelector('.menu-panel');
        const mainContent = document.querySelector('main');
        menuPanel.classList.toggle('active');
        mainContent.style.marginTop = menuPanel.classList.contains('active') ? '200px' : '40px'; // Поднимаем контент, когда меню открыто
    }

    // Вызываем функцию для отображения заявок
    displayRequests();
</script>

</body>
</html>
