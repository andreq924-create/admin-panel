<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" href="favicon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <style>
        /* ОСНОВА */
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #1e2a38;
            color: #fff;
            display: flex;
            flex-direction: column;
            font-size: 16px;
        }

        /* HEADER */
        header {
            background-color: #1e2a38;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: relative;
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        /* Кнопка меню */
        .menu-button {
            display: none;
            cursor: pointer;
            flex-direction: column;
            gap: 5px;
            width: 30px;
            height: 30px;
            justify-content: space-between;
        }

        .menu-button span {
            width: 30px;
            height: 4px;
            background-color: #fff;
        }

        nav {
            display: flex;
            gap: 20px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            transition: 0.2s;
        }

        nav a:hover {
            color: #FFD700;
        }

        /* Панель меню сверху */
        .menu-panel {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            background-color: #1e2a38;
            height: auto;
            padding: 60px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            transition: top 0.3s ease-in-out;
            z-index: 5;
            overflow: hidden;
            max-height: 80vh;
        }

        .menu-panel a {
            color: #fff;
            font-size: 18px;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .menu-panel a:hover {
            color: #FFD700;
        }

        .menu-panel.active {
            top: 0;
        }

        /* MAIN */
        main {
            padding: 40px;
            flex: 1;
            transition: margin-top 0.3s ease;
        }

        main h2 {
            margin-bottom: 20px;
            color: #FFD700;
            font-size: 24px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Фильтры статусов */
        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-button {
            padding: 10px 20px;
            border-radius: 30px;
            background-color: #333;
            color: #fff;
            border: 2px solid #333;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-button:hover {
            background-color: #444;
        }

        .filter-button.active {
            background-color: #FFD700;
            border-color: #FFD700;
            color: #000;
        }

        /* Сообщение о пустых заявках */
        .no-requests-message {
            color: #ccc;
            text-align: center;
            font-size: 18px;
            margin-top: 30px;
        }

        /* КАРТОЧКИ */
        .request-card {
            background-color: #1f3145;
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .request-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .request-card h3 {
            margin: 0 0 15px;
            color: #FFD700;
            font-size: 20px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .request-card h3 img {
            width: 24px;
            height: 24px;
        }

        .request-card p {
            margin: 5px 0;
            color: #fff;
            font-size: 14px;
        }

        /* Статус заявки */
        .status {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 5px 15px;
            font-weight: bold;
            border-radius: 5px;
            text-transform: uppercase;
        }

        .status.new {
            background-color: #1E90FF;
            color: white;
        }

        .status.in_progress {
            background-color: #FFA500;
            color: black;
        }

        .status.completed {
            background-color: #28a745;
            color: white;
        }

        /* Стили для изображения товаров */
        .items-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
        }

        .item {
            max-width: 120px;
            text-align: center;
        }

        .item img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        /* Кнопки для слабовидящих */
        .font-controls {
            position: fixed;
            right: 20px;
            bottom: 20px;
            display: flex;
            gap: 8px;
            z-index: 999;
        }

        .font-controls button {
            background: #FFD700;
            color: #000;
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
            transition: 0.2s;
            min-width: 52px;
        }

        .font-controls button:hover {
            background: #e6c200;
        }

        .font-controls button:active {
            transform: scale(0.97);
        }

        /* FOOTER */
        footer {
            background: #000;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }

        /* Адаптивность для мобильных */
        @media (max-width: 768px) {
            .request-card {
                padding: 15px;
                margin-bottom: 15px;
            }

            header h1 {
                font-size: 16px;
            }

            nav ul {
                gap: 10px;
                justify-content: center;
                padding: 10px 0;
            }

            footer p {
                font-size: 12px;
            }

            .menu-button {
                display: flex;
            }

            nav {
                display: none;
            }

            .menu-panel {
                top: -100%;
            }

            .menu-panel.active {
                top: 0;
            }

            .font-controls {
                right: 12px;
                bottom: 12px;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 14px;
            }

            nav ul {
                flex-direction: column;
                align-items: flex-start;
            }

            .request-card p {
                font-size: 12px;
            }

            .font-controls button {
                padding: 9px 12px;
                min-width: 48px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Личный кабинет</h1>
    <div class="menu-button" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <nav>
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="submit_request.html">Подача заявки</a></li>
            <li><a href="#" onclick="logout()">Выйти</a></li>
        </ul>
    </nav>
</header>

<div class="menu-panel">
    <a href="index.html">Главная</a>
    <a href="submit_request.html">Подача заявки</a>
    <a href="#" onclick="logout()">Выйти</a>
</div>

<main>
    <h2>Мои заявки</h2>

    <div class="filter-buttons">
        <button class="filter-button active" data-status="all" onclick="filterRequests('all')">Все</button>
        <button class="filter-button" data-status="new" onclick="filterRequests('new')">Новые</button>
        <button class="filter-button" data-status="in_progress" onclick="filterRequests('in_progress')">В ожидании</button>
        <button class="filter-button" data-status="completed" onclick="filterRequests('completed')">Выполненные</button>
    </div>

    <div class="request-container"></div>

    <div class="no-requests-message" id="no-requests-message" style="display: none;">
        Нет заявок с таким статусом.
    </div>
</main>

<div class="font-controls">
    <button type="button" onclick="changeFont(-1)">A−</button>
    <button type="button" onclick="changeFont(1)">A+</button>
</div>

<footer>
    <p>&copy; 2026 МКУ "Кировсвет". Все права защищены.</p>
</footer>

<script>
    let currentFilter = 'all';
    let currentFontSize = 16;
    const MIN_FONT_SIZE = 12;
    const MAX_FONT_SIZE = 24;

    function applyFontSize(size) {
        document.documentElement.style.fontSize = size + 'px';
        document.body.style.fontSize = size + 'px';
    }

    function loadFontSize() {
        const saved = localStorage.getItem('fontSize');
        if (saved !== null) {
            const parsed = parseInt(saved, 10);
            if (!isNaN(parsed)) {
                currentFontSize = Math.min(MAX_FONT_SIZE, Math.max(MIN_FONT_SIZE, parsed));
            }
        }
        applyFontSize(currentFontSize);
    }

    function changeFont(step) {
        currentFontSize += step;

        if (currentFontSize < MIN_FONT_SIZE) {
            currentFontSize = MIN_FONT_SIZE;
        }

        if (currentFontSize > MAX_FONT_SIZE) {
            currentFontSize = MAX_FONT_SIZE;
        }

        applyFontSize(currentFontSize);
        localStorage.setItem('fontSize', currentFontSize);
    }

    async function loadRequests() {
        try {
            const response = await fetch('requests_all.json');
            if (!response.ok) {
                throw new Error('Не удалось загрузить данные');
            }
            const requests = await response.json();
            return requests;
        } catch (error) {
            console.error('Ошибка при загрузке данных:', error);
            alert('Ошибка при загрузке данных. Проверьте консоль для подробностей.');
            return [];
        }
    }

    function normalizeStatus(status) {
        const s = (status || '').toString().trim().toLowerCase();

        if (['new', 'новая', 'новые', 'новый'].includes(s)) return 'new';
        if (['in_progress', 'в работе', 'ожидание', 'в ожидании', 'в обработке'].includes(s)) return 'in_progress';
        if (['completed', 'завершено', 'выполнено', 'выполненный', 'выполнена', 'готово'].includes(s)) return 'completed';

        return s;
    }

    function getStatusText(status) {
        const normalized = normalizeStatus(status);

        if (normalized === 'new') return 'Новая';
        if (normalized === 'in_progress') return 'В ожидании';
        if (normalized === 'completed') return 'Выполнено';

        return status || 'Новая';
    }

    async function displayRequests() {
        try {
            const requests = await loadRequests();
            const currentUsername = sessionStorage.getItem('username');

            const userRequests = requests.filter(request => request.username === currentUsername);

            const filteredRequests = userRequests.filter(request => {
                if (currentFilter === 'all') return true;
                return normalizeStatus(request.status) === currentFilter;
            });

            const container = document.querySelector('.request-container');
            container.innerHTML = '';

            const noRequestsMessage = document.getElementById('no-requests-message');

            if (filteredRequests.length === 0) {
                noRequestsMessage.style.display = 'block';
            } else {
                noRequestsMessage.style.display = 'none';
            }

            filteredRequests.forEach(request => {
                const requestCard = document.createElement('div');
                requestCard.classList.add('request-card');

                const itemsText = request.items && request.items.length > 0
                    ? request.items.map(i => `${i.name} (${i.qty || 1} шт)`).join(', ')
                    : null;

                const problemText = request.problemDescription && request.problemDescription !== '-'
                    ? `Описание проблемы: 📝 ${request.problemDescription}`
                    : null;

                let typeName = '';
                let typeIcon = '';

                if (request.type === 'both') {
                    typeName = 'Установка столбов и светильников';
                    typeIcon = '';
                } else if (request.type === 'repair') {
                    typeName = 'Ремонт повреждения электрических сетей';
                    typeIcon = '';
                } else {
                    typeName = request.type || '-';
                }

                const createdAt = new Date(request.createdAt);
                const expectedCallTime = new Date(request.expectedCallTime);

                const normalizedStatus = normalizeStatus(request.status);
                let statusClass = 'new';

                if (normalizedStatus === 'in_progress') {
                    statusClass = 'in_progress';
                } else if (normalizedStatus === 'completed') {
                    statusClass = 'completed';
                }

                const statusText = getStatusText(request.status);

                requestCard.innerHTML = `
                    <h3>${typeIcon} ${typeName}</h3>
                    <p><strong>Дата создания:</strong> 🗓️ ${createdAt.toLocaleString()}</p>
                    <p><strong>Имя:</strong> 👤 ${request.firstname} ${request.lastname}</p>
                    <p><strong>Телефон:</strong> 📞 ${request.phone}</p>
                    <p><strong>Email:</strong> 📧 ${request.email}</p>
                    <p><strong>Адрес:</strong> 📍 ${request.address}</p>
                    ${itemsText ? `<p><strong>Описание товаров:</strong> 🛍️ ${itemsText}</p>` : ''}
                    ${problemText ? `<p><strong>Описание проблемы:</strong> 📝 ${request.problemDescription}</p>` : ''}
                    <p><strong>Дата завершения:</strong> 🕒 ${expectedCallTime.toLocaleString()}</p>

                    <span class="status ${statusClass}">${statusText}</span>

                    <div class="items-list">
                        ${(request.items || []).map(item => `
                            <div class="item">
                                <img src="${item.img}" alt="${item.name}" class="item-img">
                                <p><strong>${item.name}</strong> (${item.qty || 1} шт)</p>
                            </div>
                        `).join('')}
                    </div>
                `;

                container.appendChild(requestCard);
            });
        } catch (error) {
            console.error('Ошибка при отображении заявок:', error);
            alert('Не удалось загрузить заявки. Попробуйте позже.');
        }
    }

    function filterRequests(status) {
        currentFilter = status;

        const buttons = document.querySelectorAll('.filter-button');
        buttons.forEach(button => {
            button.classList.remove('active');
        });

        const activeButton = Array.from(buttons).find(button => button.dataset.status === status);
        if (activeButton) {
            activeButton.classList.add('active');
        }

        displayRequests();
    }

    function logout() {
        sessionStorage.removeItem('username');
        alert('Вы вышли из системы.');
        window.location.href = 'index.html';
    }

    function toggleMenu() {
        const menuPanel = document.querySelector('.menu-panel');
        const mainContent = document.querySelector('main');
        menuPanel.classList.toggle('active');
        mainContent.style.marginTop = menuPanel.classList.contains('active') ? '200px' : '40px';
    }

    loadFontSize();
    displayRequests();
</script>

</body>
</html>
