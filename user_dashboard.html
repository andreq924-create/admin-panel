<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" href="favicon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <style>
        /* ОСНОВА */
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #1e2a38; /* Однородный темный фон */
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            background-color: #1e2a38;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: relative;
            z-index: 10; /* Обеспечивает, чтобы шапка была сверху */
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        /* Кнопка меню */
        .menu-button {
            display: none;
            cursor: pointer;
            flex-direction: column;
            gap: 5px;
            width: 30px;
            height: 30px;
            justify-content: space-between;
        }

        .menu-button span {
            width: 30px;
            height: 4px;
            background-color: #fff;
        }

        nav {
            display: flex;
            gap: 20px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            transition: 0.2s;
        }

        nav a:hover {
            color: #FFD700;
        }

        /* Панель меню сверху */
        .menu-panel {
            position: absolute;
            top: -100%; /* Начальное скрытое положение меню (выше экрана) */
            left: 0;
            width: 100%;
            background-color: #1e2a38;
            height: auto;
            padding: 60px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            transition: top 0.3s ease-in-out; /* Плавное появление */
            z-index: 5;
            overflow: hidden;
            max-height: 80vh;
        }

        .menu-panel a {
            color: #fff; /* Устанавливаем белый цвет для текста */
            font-size: 18px;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .menu-panel a:hover {
            color: #FFD700; /* Цвет при наведении */
        }

        .menu-panel.active {
            top: 0; /* При активации панель спускается */
        }

        /* MAIN */
        main {
            padding: 40px;
            flex: 1;
            transition: margin-top 0.3s ease; /* Плавное движение контента */
        }

        main h2 {
            margin-bottom: 20px;
            color: #FFD700;
            font-size: 24px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Фильтры статусов */
        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .filter-button {
            padding: 10px 20px;
            border-radius: 30px;
            background-color: #333;
            color: #fff;
            border: 2px solid #333;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-button:hover {
            background-color: #444;
        }

        .filter-button.active {
            background-color: #FFD700;
            border-color: #FFD700;
        }

        /* КАРТОЧКИ (для мобильных) */
        .request-card {
            background-color: #1f3145;
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .request-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .request-card h3 {
            margin: 0 0 15px;
            color: #FFD700;
            font-size: 20px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .request-card h3 img {
            width: 24px;
            height: 24px;
        }

        .request-card p {
            margin: 5px 0;
            color: #fff;
            font-size: 14px;
        }

        /* Статус заявки в правом верхнем углу */
        .status {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 5px 15px;
            font-weight: bold;
            border-radius: 5px;
            text-transform: uppercase;
        }

        .status.new {
            background-color: #FF6347;
            color: white;
        }

        .status.in_progress {
            background-color: #FFD700;
            color: black;
        }

        .status.completed {
            background-color: #32CD32;
            color: white;
        }

        /* Стили для изображения товаров */
        .items-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
        }

        .item {
            max-width: 120px;
            text-align: center;
        }

        .item img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        /* FOOTER */
        footer {
            background: #000;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }

        /* Адаптивность для мобильных */
        @media (max-width: 768px) {
            .request-card {
                padding: 15px;
                margin-bottom: 15px;
            }

            header h1 {
                font-size: 16px;
            }

            nav ul {
                gap: 10px;
                justify-content: center;
                padding: 10px 0;
            }

            footer p {
                font-size: 12px;
            }

            .menu-button {
                display: flex;
            }

            nav {
                display: none;
            }

            .menu-panel {
                top: -100%; /* Мобильное меню скрыто за экраном */
            }

            .menu-panel.active {
                top: 0; /* Панель открывается сверху */
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 14px;
            }

            nav ul {
                flex-direction: column;
                align-items: flex-start;
            }

            .request-card p {
                font-size: 12px;
            }
        }

    </style>
</head>
<body>

<header>
    <h1>Личный кабинет</h1>
    <div class="menu-button" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <nav>
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="submit_request.html">Подача заявки</a></li>
            <li><a href="#" onclick="logout()">Выйти</a></li>
        </ul>
    </nav>
</header>

<div class="menu-panel">
    <a href="index.html">Главная</a>
    <a href="submit_request.html">Подача заявки</a>
    <a href="#" onclick="logout()">Выйти</a>
</div>

<main>
    <h2>Мои заявки</h2>

    <!-- Фильтры -->
    <div class="filter-buttons">
        <button class="filter-button active" onclick="filterRequests('all')">Все</button>
        <button class="filter-button" onclick="filterRequests('new')">Новые</button>
        <button class="filter-button" onclick="filterRequests('in_progress')">В работе</button>
        <button class="filter-button" onclick="filterRequests('completed')">Завершенные</button>
    </div>

    <div class="request-container">
        <!-- Здесь будут отображаться карточки заявок -->
    </div>

</main>

<footer>
    <p>&copy; 2026 МКУ "Кировсвет". Все права защищены.</p>
</footer>

<script>
    let currentFilter = 'all';

    // Загрузка заявок из requests_all.json
    async function loadRequests() {
        try {
            const response = await fetch('requests_all.json');
            if (!response.ok) {
                throw new Error('Не удалось загрузить данные');
            }
            const requests = await response.json();
            return requests;
        } catch (error) {
            console.error('Ошибка при загрузке данных:', error);
            alert('Ошибка при загрузке данных. Проверьте консоль для подробностей.');
            return [];
        }
    }

    // Отображение заявок
    async function displayRequests() {
        try {
            // Загружаем заявки
            const requests = await loadRequests();

            // Фильтруем заявки по текущему пользователю и выбранному фильтру
            const userRequests = requests.filter(request => request.username === sessionStorage.getItem('username'));

            // Фильтруем заявки по выбранному фильтру
            const filteredRequests = userRequests.filter(request => currentFilter === 'all' || request.status === currentFilter);

            // Находим контейнер для заявок
            const container = document.querySelector('.request-container');
            container.innerHTML = ''; // Очищаем контейнер перед добавлением новых данных

            // Перебираем заявки и генерируем карточки
            filteredRequests.forEach(request => {
                const requestCard = document.createElement('div');
                requestCard.classList.add('request-card');

                // Формируем список товаров (items)
                let itemsText = request.items && request.items.length > 0
                    ? request.items.map(i => `${i.name} (${i.qty || 1} шт)`).join(', ')
                    : null;

                // Форматируем описание проблемы
                let problemText = request.problemDescription && request.problemDescription !== '-' 
                    ? `Описание проблемы: 📝 ${request.problemDescription}`
                    : null;

                // Форматируем тип заявки
                let typeName = '';
                let typeIcon = ''; // Без эмодзи по умолчанию

                if (request.type === 'both') {
                    typeName = 'Установка столбов и светильников';
                    typeIcon = ''; // Без эмодзи для установки
                } else if (request.type === 'repair') {
                    typeName = 'Ремонт повреждения электрических сетей';
                    typeIcon = ''; // Без эмодзи для ремонта
                } else {
                    typeName = request.type || '-'; // Если тип не задан, показываем дефолтное значение '-'
                }

                // Форматируем дату
                const createdAt = new Date(request.createdAt);
                const expectedCallTime = new Date(request.expectedCallTime);

                // Определение статуса заявки
                let statusClass = 'new';
                if (request.status === 'in_progress') {
                    statusClass = 'in_progress';
                } else if (request.status === 'completed') {
                    statusClass = 'completed';
                }

                // Формируем HTML для карточки
                requestCard.innerHTML = `
                    <h3>${typeIcon} ${typeName}</h3>
                    <p><strong>Дата создания:</strong> 🗓️ ${createdAt.toLocaleString()}</p>
                    <p><strong>Имя:</strong> 👤 ${request.firstname} ${request.lastname}</p>
                    <p><strong>Телефон:</strong> 📞 ${request.phone}</p>
                    <p><strong>Email:</strong> 📧 ${request.email}</p>
                    <p><strong>Адрес:</strong> 📍 ${request.address}</p>
                    ${itemsText ? `<p><strong>Описание товаров:</strong> 🛍️ ${itemsText}</p>` : ''} <!-- Условие для товаров -->
                    ${problemText ? `<p><strong>Описание проблемы:</strong> 📝 ${request.problemDescription}</p>` : ''} <!-- Условие для проблемы -->
                    <p><strong>Дата завершения:</strong> 🕒 ${expectedCallTime.toLocaleString()}</p>

                    <!-- Статус в правом верхнем углу -->
                    <span class="status ${statusClass}">${request.status || 'Новая'}</span>

                    <div class="items-list">
                        ${(request.items || []).map(item => `
                            <div class="item">
                                <img src="${item.img}" alt="${item.name}" class="item-img">
                                <p><strong>${item.name}</strong> (${item.qty || 1} шт)</p>
                            </div>
                        `).join('')}
                    </div>
                `;

                // Добавляем карточку в контейнер
                container.appendChild(requestCard);
            });
        } catch (error) {
            console.error('Ошибка при отображении заявок:', error);
            alert('Не удалось загрузить заявки. Попробуйте позже.');
        }
    }


   // Фильтрация заявок
function filterRequests(status) {
    // Обновляем текущий фильтр
    currentFilter = status;

    // Обновляем стиль активной кнопки
    const buttons = document.querySelectorAll('.filter-button');
    
    // Убираем класс active у всех кнопок
    buttons.forEach(button => {
        button.classList.remove('active');
    });

    // Находим кнопку, на которую нажали, и добавляем класс active
    const activeButton = Array.from(buttons).find(button => button.textContent.trim() === status);
    if (activeButton) {
        activeButton.classList.add('active'); // Добавляем класс active
    }

    // Перерисовываем заявки с учетом нового фильтра
    displayRequests();
}

    // Выход
    function logout() {
        sessionStorage.removeItem('username');
        alert('Вы вышли из системы.');
        window.location.href = 'index.html';
    }

    // Функция для переключения меню
    function toggleMenu() {
        const menuPanel = document.querySelector('.menu-panel');
        const mainContent = document.querySelector('main');
        menuPanel.classList.toggle('active');
        mainContent.style.marginTop = menuPanel.classList.contains('active') ? '200px' : '40px'; // Поднимаем контент, когда меню открыто
    }

    // Вызываем функцию для отображения заявок
    displayRequests();
</script>

</body>
</html>
