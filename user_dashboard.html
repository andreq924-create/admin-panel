<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="favicon.png" type="image/png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <style>
        /* ОСНОВА */
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #1e2a38; /* Однородный темный фон */
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            background-color: #1e2a38;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: relative;
            z-index: 10; /* Обеспечивает, чтобы шапка была сверху */
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        /* Кнопка меню */
        .menu-button {
            display: none;
            cursor: pointer;
            flex-direction: column;
            gap: 5px;
            width: 30px;
            height: 30px;
            justify-content: space-between;
        }

        .menu-button span {
            width: 30px;
            height: 4px;
            background-color: #fff;
        }

        nav {
            display: flex;
            gap: 20px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            transition: 0.2s;
        }

        nav a:hover {
            color: #FFD700;
        }

        /* Панель меню сверху */
        .menu-panel {
            position: absolute;
            top: -100%; /* Начальное скрытое положение меню (выше экрана) */
            left: 0;
            width: 100%;
            background-color: #1e2a38;
            height: auto;
            padding: 60px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            transition: top 0.3s ease-in-out; /* Плавное появление */
            z-index: 5;
            overflow: hidden;
            max-height: 80vh;
        }

        .menu-panel a {
            color: #fff; /* Устанавливаем белый цвет для текста */
            font-size: 18px;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .menu-panel a:hover {
            color: #FFD700; /* Цвет при наведении */
        }

        .menu-panel.active {
            top: 0; /* При активации панель спускается */
        }

        /* MAIN */
        main {
            padding: 40px;
            flex: 1;
            transition: margin-top 0.3s ease; /* Плавное движение контента */
        }

        main h2 {
            margin-bottom: 20px;
            color: #FFD700;
            font-size: 24px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ФИЛЬТРЫ */
        .filters {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }

        .filter-btn:hover {
            background: rgba(255, 215, 0, 0.15);
            border-color: rgba(255, 215, 0, 0.4);
        }

        .filter-btn.active {
            background: #FFD700;
            color: #1e2a38;
            font-weight: bold;
        }

        /* КАРТОЧКИ */
        .request-container {
            max-height: 400px;
            overflow-y: auto;
            padding: 18px;
            border-radius: 20px;
            background: linear-gradient(180deg, rgba(22, 34, 49, 0.92), rgba(18, 28, 41, 0.96));
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow:
                0 18px 40px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .request-card {
            position: relative;
            overflow: hidden;
            margin-bottom: 18px;
            padding: 22px 22px 20px;
            border-radius: 22px;
            background: linear-gradient(145deg, rgba(35, 53, 74, 0.96), rgba(18, 29, 42, 0.98));
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow:
                0 14px 35px rgba(0, 0, 0, 0.38),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
            display: block;
        }

        .request-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at top right, rgba(255, 215, 0, 0.16), transparent 32%),
                radial-gradient(circle at bottom left, rgba(0, 183, 255, 0.10), transparent 28%);
            pointer-events: none;
        }

        .request-card::after {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #FFD700, rgba(255, 215, 0, 0.15));
            border-radius: 4px;
        }

        .request-card:hover {
            transform: translateY(-7px);
            box-shadow:
                0 22px 48px rgba(0, 0, 0, 0.48),
                0 0 0 1px rgba(255, 215, 0, 0.10);
            border-color: rgba(255, 215, 0, 0.18);
        }

        .request-card h3 {
            margin: 0 0 14px;
            color: #FFD700;
            font-size: 19px;
            line-height: 1.35;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            padding-bottom: 10px;
        }

        .request-card h3::after {
            content: "";
            display: block;
            width: 72px;
            height: 2px;
            margin-top: 10px;
            border-radius: 999px;
            background: linear-gradient(90deg, #FFD700, rgba(255, 215, 0, 0.15));
        }

        .request-card p {
            margin: 7px 0;
            color: rgba(255, 255, 255, 0.88);
            font-size: 14px;
            line-height: 1.55;
            position: relative;
        }

        .request-card p strong {
            color: #ffffff;
        }

        .items-list {
            margin-top: 16px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        .item {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 10px;
            text-align: center;
            transition: transform 0.22s ease, background 0.22s ease, border-color 0.22s ease;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .item:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 215, 0, 0.18);
        }

        .item img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 8px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.24);
        }

        .item p {
            font-size: 12px;
            margin: 0;
            color: rgba(255, 255, 255, 0.84);
            line-height: 1.35;
        }

        /* FOOTER */
        footer {
            background: #000;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }

        /* Адаптивность для мобильных */
        @media (max-width: 768px) {
            .request-card {
                padding: 18px 16px;
                border-radius: 18px;
            }

            .request-card h3 {
                font-size: 17px;
            }

            .request-card p {
                font-size: 12.5px;
            }

            .items-list {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
                gap: 10px;
            }

            .item img {
                height: 78px;
            }

            header h1 {
                font-size: 16px;
            }

            nav ul {
                gap: 10px;
                justify-content: center;
                padding: 10px 0;
            }

            footer p {
                font-size: 12px;
            }

            .menu-button {
                display: flex;
            }

            nav {
                display: none;
            }

            .menu-panel {
                top: -100%; /* Мобильное меню скрыто за экраном */
            }

            .menu-panel.active {
                top: 0; /* Панель открывается сверху */
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 14px;
            }

            nav ul {
                flex-direction: column;
                align-items: flex-start;
            }

            .request-card p {
                font-size: 12px;
            }

            .filters {
                gap: 8px;
            }

            .filter-btn {
                padding: 9px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Личный кабинет</h1>
    <div class="menu-button" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <nav>
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="submit_request.html">Подача заявки</a></li>
            <li><a href="#" onclick="logout()">Выйти</a></li>
        </ul>
    </nav>
</header>

<div class="menu-panel">
    <a href="index.html">Главная</a>
    <a href="submit_request.html">Подача заявки</a>
    <a href="#" onclick="logout()">Выйти</a>
</div>

<main>
    <h2>Мои заявки</h2>

    <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">Все</button>
        <button class="filter-btn" onclick="setFilter('new', this)">Новые</button>
        <button class="filter-btn" onclick="setFilter('in_work', this)">В работе</button>
        <button class="filter-btn" onclick="setFilter('done', this)">В завершено</button>
    </div>

    <div class="request-container">
        <!-- Здесь будут отображаться карточки заявок -->
    </div>

</main>

<footer>
    <p>&copy; 2026 МКУ "Кировсвет". Все права защищены.</p>
</footer>

<script>
    let currentFilter = 'all';

    function normalizeStatus(status) {
        return String(status || '')
            .trim()
            .toLowerCase()
            .replace(/\s+/g, '_');
    }

    function setFilter(filter, btn) {
        currentFilter = filter;

        document.querySelectorAll('.filter-btn').forEach(button => {
            button.classList.remove('active');
        });

        if (btn) {
            btn.classList.add('active');
        }

        displayRequests();
    }

    // Загрузка заявок из requests_all.json
    async function loadRequests() {
        try {
            const response = await fetch('requests_all.json');  // Путь к вашему JSON файлу
            if (!response.ok) {
                throw new Error('Не удалось загрузить данные');
            }
            const requests = await response.json();
            return requests;
        } catch (error) {
            console.error('Ошибка при загрузке данных:', error);
            alert('Ошибка при загрузке данных. Проверьте консоль для подробностей.');
            return [];
        }
    }

    // Отображение заявок
    async function displayRequests() {
        const requests = await loadRequests();
        const myUsername = sessionStorage.getItem('username');

        const userRequests = requests.filter(request => {
            const isMine = request.username === myUsername;
            if (!isMine) return false;

            const status = normalizeStatus(request.status || 'new');

            if (currentFilter === 'all') return true;
            if (currentFilter === 'new') return status === 'new' || status === 'новая';
            if (currentFilter === 'in_work') return status === 'in_work' || status === 'в_работе' || status === 'в_работе';
            if (currentFilter === 'done') return status === 'done' || status === 'в_завершено' || status === 'завершено';

            return true;
        });

        const container = document.querySelector('.request-container');
        container.innerHTML = '';  // Очищаем контейнер

        userRequests.forEach(request => {
            const requestCard = document.createElement('div');
            requestCard.classList.add('request-card');

            // Формируем список товаров (items)
            let itemsText = '-';
            if (request.items && request.items.length > 0) {
                itemsText = request.items.map(i => `${i.name} (${i.qty || 1} шт)`).join(', ');
            }

            // Форматируем тип заявки
            let typeName = '';
            if (request.type === 'both') typeName = 'Установка столбов и светильников';
            else if (request.type === 'repair') typeName = 'Ремонт повреждения электрических сетей';
            else typeName = request.type || '-';

            // Форматируем дату
            const createdAt = new Date(request.createdAt);
            const expectedCallTime = new Date(request.expectedCallTime);

            requestCard.innerHTML = `
                <h3>Тип заявки: ${typeName}</h3>
                <p><strong>Дата создания:</strong> ${createdAt.toLocaleString()}</p>
                <p><strong>Имя:</strong> ${request.firstname} ${request.lastname}</p>
                <p><strong>Телефон:</strong> ${request.phone}</p>
                <p><strong>Email:</strong> ${request.email}</p>
                <p><strong>Адрес:</strong> ${request.address}</p>
                <p><strong>Описание товаров:</strong> ${itemsText}</p>
                <p><strong>Описание проблемы:</strong> ${request.problemDescription || '-'}</p>
                <p><strong>Дата завершения:</strong> ${expectedCallTime.toLocaleString()}</p>
                <p><strong>Статус:</strong> ${request.status || 'Новая'}</p>
                <div class="items-list">
                    ${(request.items || []).map(item => `
                        <div class="item">
                            <img src="${item.img}" alt="${item.name}" class="item-img">
                            <p><strong>${item.name}</strong> (${item.qty || 1} шт)</p>
                        </div>
                    `).join('')}
                </div>
            `;

            container.appendChild(requestCard);
        });
    }

    // Выход
    function logout() {
        sessionStorage.removeItem('username');
        alert('Вы вышли из системы.');
        window.location.href = 'index.html';
    }

    // Функция для переключения меню
    function toggleMenu() {
        const menuPanel = document.querySelector('.menu-panel');
        const mainContent = document.querySelector('main');
        menuPanel.classList.toggle('active');
        mainContent.style.marginTop = menuPanel.classList.contains('active') ? '200px' : '40px'; // Поднимаем контент, когда меню открыто
    }

    // Вызываем функцию для отображения заявок
    displayRequests();
</script>

</body>
</html>
