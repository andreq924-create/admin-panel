<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="favicon.png" type="image/png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <style>
        /* ОСНОВА */
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #1e2a38;
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #1e2a38;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: relative;
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        .menu-button {
            display: none;
            cursor: pointer;
            flex-direction: column;
            gap: 5px;
            width: 30px;
            height: 30px;
            justify-content: space-between;
        }

        .menu-button span {
            width: 30px;
            height: 4px;
            background-color: #fff;
        }

        nav {
            display: flex;
            gap: 20px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            transition: 0.2s;
        }

        nav a:hover {
            color: #FFD700;
        }

        .menu-panel {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            background-color: #1e2a38;
            height: auto;
            padding: 60px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            transition: top 0.3s ease-in-out;
            z-index: 5;
            overflow: hidden;
            max-height: 80vh;
        }

        .menu-panel a {
            color: #fff;
            font-size: 18px;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .menu-panel a:hover {
            color: #FFD700;
        }

        .menu-panel.active {
            top: 0;
        }

        main {
            padding: 40px;
            flex: 1;
            transition: margin-top 0.3s ease;
        }

        main h2 {
            margin-bottom: 20px;
            color: #FFD700;
            font-size: 24px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ====== НОВЫЙ ДОРОГОЙ ДИЗАЙН КАРТОЧЕК ====== */

        .request-card {
            background: linear-gradient(145deg, rgba(31,49,69,0.95), rgba(25,38,55,0.95));
            border: 1px solid rgba(255, 215, 0, 0.08);
            margin-bottom: 18px;
            padding: 18px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: block;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .request-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #FFD700, transparent);
            opacity: 0.8;
        }

        .request-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.55);
            border-color: rgba(255, 215, 0, 0.25);
        }

        .request-card h3 {
            margin: 0 0 12px;
            color: #FFD700;
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        .request-card p {
            margin: 6px 0;
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            line-height: 1.4;
        }

        .request-card p strong {
            color: #fff;
        }

        .request-container {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
            padding-left: 15px;
            padding-bottom: 10px;
            border-radius: 10px;
            background-color: #1f3145;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .items-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.04);
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            transition: 0.2s;
        }

        .item:hover {
            background: rgba(255,255,255,0.07);
            transform: translateY(-2px);
        }

        .item img {
            width: 42px;
            height: 42px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }

        .item p {
            margin: 0;
            font-size: 13px;
        }

        footer {
            background: #000;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .menu-button { display: flex; }
            nav { display: none; }
        }
    </style>
</head>
<body>

<header>
    <h1>Личный кабинет</h1>
    <div class="menu-button" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <nav>
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="submit_request.html">Подача заявки</a></li>
            <li><a href="#" onclick="logout()">Выйти</a></li>
        </ul>
    </nav>
</header>

<div class="menu-panel">
    <a href="index.html">Главная</a>
    <a href="submit_request.html">Подача заявки</a>
    <a href="#" onclick="logout()">Выйти</a>
</div>

<main>
    <h2>Мои заявки</h2>

    <div class="request-container">
    </div>
</main>

<footer>
    <p>&copy; 2026 МКУ "Кировсвет". Все права защищены.</p>
</footer>

<script>
async function loadRequests() {
    try {
        const response = await fetch('requests_all.json');
        const requests = await response.json();
        return requests;
    } catch (error) {
        return [];
    }
}

async function displayRequests() {
    const requests = await loadRequests();
    const userRequests = requests.filter(r => r.username === sessionStorage.getItem('username'));

    const container = document.querySelector('.request-container');
    container.innerHTML = '';

    userRequests.forEach(request => {

        let itemsText = '-';
        if (request.items && request.items.length > 0) {
            itemsText = request.items.map(i => `${i.name} (${i.qty || 1} шт)`).join(', ');
        }

        let typeName = '';
        if (request.type === 'both') typeName = 'Установка столбов и светильников';
        else if (request.type === 'repair') typeName = 'Ремонт повреждения электрических сетей';
        else typeName = request.type || '-';

        const createdAt = new Date(request.createdAt);
        const expectedCallTime = new Date(request.expectedCallTime);

        const card = document.createElement('div');
        card.className = 'request-card';

        card.innerHTML = `
            <h3>${typeName}</h3>
            <p><strong>Дата:</strong> ${createdAt.toLocaleString()}</p>
            <p><strong>Имя:</strong> ${request.firstname} ${request.lastname}</p>
            <p><strong>Телефон:</strong> ${request.phone}</p>
            <p><strong>Email:</strong> ${request.email}</p>
            <p><strong>Адрес:</strong> ${request.address}</p>
            <p><strong>Описание товаров:</strong> ${itemsText}</p>
            <p><strong>Описание проблемы:</strong> ${request.problemDescription || '-'}</p>
            <p><strong>Статус:</strong> ${request.status || 'Новая'}</p>
        `;

        container.appendChild(card);
    });
}

function logout() {
    sessionStorage.removeItem('username');
    window.location.href = 'index.html';
}

function toggleMenu() {
    document.querySelector('.menu-panel').classList.toggle('active');
}

displayRequests();
</script>

</body>
</html>
