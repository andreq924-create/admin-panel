<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <style>
        /* Стиль для страницы */
        html, body {
            height: 100%;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e2a38, #2f3f52);
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #1e2a38;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            transition: 0.2s;
        }

        nav a:hover {
            color: #FFD700;
        }

        main {
            padding: 40px;
            flex: 1;
        }

        main h2 {
            margin-bottom: 20px;
            color: #FFD700;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1f3145;
            color: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        thead {
            background-color: #1e2a38;
            color: #FFD700;
        }

        th, td {
            padding: 12px 10px;
            text-align: left;
            vertical-align: top;
        }

        tbody tr:nth-child(even) {
            background-color: #25394e;
        }

        tbody tr:nth-child(odd) {
            background-color: #1f3145;
        }

        tbody tr:hover {
            background-color: #3a5a7a;
            transition: 0.2s;
        }

        footer {
            background: #000;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <h1>Личный кабинет</h1>
    <nav>
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="submit_request.html">Подача заявки</a></li>
            <li><a href="#" onclick="logout()">Выйти</a></li>
        </ul>
    </nav>
</header>

<main>
    <h2>Мои заявки</h2>

    <table id="requestsTable">
        <thead>
            <tr>
                <th>Дата</th>
                <th>Тип заявки</th>
                <th>Выбранные предметы / Описание проблемы</th>
                <th>Дата завершения</th>
                <th>Статус</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</main>

<footer>
    <p>&copy; 2026 МКУ "Кировсвет". Все права защищены.</p>
</footer>

<script>
// Проверка, вошёл ли пользователь
if (!sessionStorage.getItem('username')) {
    alert('Вы не вошли в систему. Пожалуйста, авторизуйтесь.');
    window.location.href = 'login.html'; // Перенаправление на страницу входа
} else {
    displayRequests();
}

// Загрузка заявок с внешнего источника
async function loadRequests() {
    const response = await fetch('https://resilient-syrniki-a7095d.netlify.app/path/to/requests_all.json');
    
    if (!response.ok) {
        alert('Ошибка загрузки данных заявок.');
        return [];
    }
    
    const data = await response.json();
    return data;
}

// Отображение заявок для конкретного пользователя
async function displayRequests() {
    const username = sessionStorage.getItem('username'); // Получаем username из sessionStorage
    if (!username) {
        alert('Вы не вошли в систему.');
        window.location.href = 'login.html'; // Перенаправление на страницу входа
    }

    const requests = await loadRequests(); // Загружаем все заявки

    // Фильтрация заявок по текущему пользователю
    const userRequests = requests.filter(request => request.username === username);

    const tbody = document.getElementById('requestsTable').getElementsByTagName('tbody')[0];
    tbody.innerHTML = ''; // Очистить таблицу перед добавлением новых данных

    userRequests.forEach(request => {
        const row = tbody.insertRow();

        // Определяем, что выводить в колонке "Выбранные предметы / Описание проблемы"
        let itemsText = '-';
        if(request.type === 'repair' && request.problemDescription) {
            itemsText = request.problemDescription;
        } else if(request.items && request.items.length > 0) {
            itemsText = request.items.map(i => `${i.name} (${i.qty || 1} шт)`).join(', ');
        }

        // Красивое отображение типа работы
        let typeName = '';
        if(request.type === 'both') typeName = 'Установка столбов и светильников';
        else if(request.type === 'repair') typeName = 'Ремонт повреждения электрических сетей';
        else typeName = request.type || '-';

        row.insertCell(0).textContent = request.date || '-';
        row.insertCell(1).textContent = typeName;
        row.insertCell(2).textContent = itemsText;
        row.insertCell(3).textContent = request.expectedCallTime
            ? new Date(request.expectedCallTime).toLocaleString()
            : '-';
        row.insertCell(4).textContent = request.status || 'Новая';
    });
}

// Выход
function logout() {
    sessionStorage.removeItem('username');
    alert('Вы вышли из системы.');
    window.location.href = 'index.html';
}
</script>

</body>
</html>
