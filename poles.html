<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="favicon.png" type="image/png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Опоры - Тёмная тема</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 30px;
    background: linear-gradient(135deg, #1c1c1c, #2a2a2a);
    color: #eee;
    box-sizing: border-box;
    position: relative;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 2.5rem;
    color: #FFD700;
    animation: fadeInUp 0.5s ease;
}

/* ===== СЕТКА ПЕРВОГО УРОВНЯ ===== */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: flex-start;
}

.grid .card {
    flex: 0 0 calc(25% - 20px);
    min-width: 200px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.5s forwards;
}

.grid .card:nth-child(1) { animation-delay: 0.05s; }
.grid .card:nth-child(2) { animation-delay: 0.1s; }
.grid .card:nth-child(3) { animation-delay: 0.15s; }
.grid .card:nth-child(4) { animation-delay: 0.2s; }

/* ===== ДОЧЕРНИЕ (GRID) ===== */
.size-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    width: 100%;
    animation: fadeInUp 0.5s ease;
}

.size-grid .card {
    width: 100%;
}

/* ===== CARD ===== */
.card {
    background-color: #2f2f2f;
    border: 1px solid #444;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.card:hover {
    transform: scale(1.05) translateY(-5px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.6);
    border-color: #FFD700;
}

.card img {
    width: 100%;
    height: 280px;
    object-fit: contain;
    border-bottom: 1px solid #444;
    background-color: #1c1c1c;
    transition: transform 0.5s ease;
}

.card:hover img {
    transform: scale(1.05);
}

.card h3 {
    margin: 12px;
    font-size: 1.3rem;
    color: #FFD700;
}

.qty-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #FFD700;
    color: #000;
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 16px;
    font-weight: bold;
    animation: popIn 0.5s ease;
}

/* кнопки */
button {
    margin-top: 20px;
    padding: 12px 25px;
    background-color: #FFD700;
    color: #000;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background-color: #FFC300;
}

button.back-btn {
    position: absolute;
    top: 10px;
    left: 10px;
    background-color: #28a745;
    color: #fff;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
    z-index: 10;
}

button.back-btn:hover {
    background-color: #218838;
}

/* ===== ДЕТАЛИ ===== */
.details-container {
    display: flex;
    flex-direction: row;
    gap: 40px;
    margin-top: 20px;
    align-items: flex-start;
    flex-wrap: nowrap;
    justify-content: center;
    animation: fadeIn 0.5s ease;
}

.details-container .image {
    width: 550px;
    flex: 0 0 550px;
    animation: slideInLeft 0.5s ease;
}

.details-container .image img {
    width: 100%;
    height: 400px;
    object-fit: contain;
    display: block;
    border-radius: 12px;
    border: 1px solid #444;
}

.details-container .info {
    width: 600px;
    flex: 0 0 600px;
    padding: 20px 15px;
    background-color: #2f2f2f;
    border: 1px solid #444;
    border-radius: 12px;
    animation: slideInRight 0.5s ease;
}

.details-container table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

.details-container td:first-child {
    width: 180px;
    font-weight: bold;
    color: #FFD700;
}

/* 📱 адаптация */
@media (max-width: 1200px) {
    .grid .card {
        flex: 0 0 calc(33.33% - 20px);
    }

    .size-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media (max-width: 900px) {
    .grid .card {
        flex: 0 0 calc(50% - 20px);
    }

    .size-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 600px) {
    .grid .card {
        flex: 0 0 100%;
    }

    .size-grid {
        grid-template-columns: 1fr;
    }

    .details-container {
        flex-direction: column;
        align-items: center;
    }

    .details-container .image,
    .details-container .info {
        width: 100%;
        flex: none;
    }

    .details-container .image img {
        height: auto;
        max-height: 300px;
    }
}

/* ===== МОДАЛКА ===== */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(12px);
    background: rgba(0,0,0,0.75);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    animation: fadeIn 0.3s ease;
}

.hidden {
    display: none;
}

.modal-content {
    background: rgba(47,47,47,0.9);
    border: 1px solid rgba(255, 215, 0, 0.3);
    backdrop-filter: blur(10px);
    padding: 30px 25px;
    border-radius: 16px;
    text-align: center;
    color: #eee;
    width: 340px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.7);
    animation: scaleIn 0.3s ease;
}

.modal-content h3 {
    color: #FFD700;
    margin-bottom: 10px;
    font-size: 26px;
}

.modal-content p {
    font-size: 18px;
    color: #ccc;
}

.modal-buttons {
    margin-top: 20px;
    display: flex;
    gap: 12px;
    justify-content: center;
    align-items: center;
}

.modal-buttons button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    font-size: 15px;
    transition: transform 0.2s ease, background 0.3s ease;
}

.modal-buttons button:hover {
    transform: scale(1.05);
}

.modal-buttons button:first-child {
    background: #444;
    color: #fff;
}

.modal-buttons button:last-child {
    background: #FFD700;
    color: #000;
}

.close-btn {
    position: absolute;
    top: 12px;
    right: 14px;
    cursor: pointer;
    font-size: 20px;
    color: #aaa;
    transition: 0.3s;
}

.close-btn:hover {
    color: #fff;
    transform: rotate(90deg);
}

/* ===== АНИМАЦИИ ===== */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes scaleIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

@keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-30px); }
    to { opacity: 1; transform: translateX(0); }
}

@keyframes slideInRight {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
}

@keyframes popIn {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
}

</style>
</head>

<body>

<h2>Опоры</h2>

<button id="menuBtn" class="back-btn" onclick="goToMenu()">Главное меню</button>

<div class="grid" id="grid"></div>

<!-- МОДАЛКА -->
<div id="authModal" class="modal hidden">
    <div class="modal-content">
        <span class="close-btn" onclick="closeAuthModal()">✖</span>
        <h3>Требуется авторизация</h3>
        <p>Чтобы оставить заявку, нужно войти или зарегистрироваться</p>

        <div class="modal-buttons">
            <button onclick="goToRegister()">Регистрация</button>
            <button onclick="goToLogin()">Вход</button>
        </div>
    </div>
</div>

<script>
const warehouseKey = 'warehouse';
const grid = document.getElementById("grid");
const urlParams = new URLSearchParams(window.location.search);
const fromIndex = urlParams.get('from') === 'index';

function goToMenu() { window.location.href = "index.html"; }
function toggleMenuBtn(show) { document.getElementById("menuBtn").style.display = show ? "block" : "none"; }
function isUserLoggedIn() { return sessionStorage.getItem("username") !== null; }
function openAuthModal() { document.getElementById("authModal").classList.remove("hidden"); }
function closeAuthModal() { document.getElementById("authModal").classList.add("hidden"); }
function goToLogin() { window.location.href = "login.html"; }
function goToRegister() { window.location.href = "register.html"; }

async function loadWarehouse() {
    try {
        const response = await fetch('./warehouse.json');
        const data = await response.json();
        localStorage.setItem(warehouseKey, JSON.stringify(data));
        loadGrid();
    } catch {
        const warehouseLS = localStorage.getItem(warehouseKey);
        if (warehouseLS) loadGrid();
        else alert("Данные недоступны!");
    }
}

function loadGrid() {
    toggleMenuBtn(true);
    const warehouse = JSON.parse(localStorage.getItem(warehouseKey)) || [];
    const poles = warehouse.filter(item => item.category === 'pole');

    grid.innerHTML = '';
    document.querySelector('h2').textContent = 'Опоры';

    poles.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<img src="${item.img}"><h3>${item.name}</h3>`;
        card.onclick = () => showChildren(index);
        grid.appendChild(card);
    });
}

function showChildren(index) {
    toggleMenuBtn(false);
    const warehouse = JSON.parse(localStorage.getItem(warehouseKey)) || [];
    const parent = warehouse[index];
    const children = parent.children || [];
    document.querySelector('h2').textContent = `Длина ${parent.name}`;

    grid.innerHTML = `
        <div class="size-grid">
            ${children.map((c, childIndex) => {
                const img = c.img || parent.img;
                return `
                <div class="card" onclick="showProductDetails(${index}, ${childIndex})">
                    <img src="${img}">
                    <h3>${c.name}</h3>
                    <span class="qty-badge">${c.qty}</span>
                </div>`;
            }).join('')}
        </div>
        <button class="back-btn" onclick="loadGrid()">Назад</button>
    `;
}

function handleAction(parentIndex, childIndex) {
    const warehouse = JSON.parse(localStorage.getItem(warehouseKey)) || [];
    const parent = warehouse[parentIndex];
    const child = parent.children[childIndex];

    if (fromIndex) {
        if (!isUserLoggedIn()) { openAuthModal(); return; }
        localStorage.setItem("requestItem", JSON.stringify({ name: child.name, price: child.price, img: child.img || parent.img }));
        window.location.href = "submit_request.html";
    } else {
        if (child.qty < 1) { alert("Нет в наличии"); return; }
        let selected = JSON.parse(localStorage.getItem("selectedItems")) || [];
        let exist = selected.find(i => i.name === child.name);
        if (exist) exist.qty += 1;
        else selected.push({ name: child.name, price: child.price, qty: 1, img: parent.img });
        localStorage.setItem("selectedItems", JSON.stringify(selected));

        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('forAdmin') === '1';

        if (isAdmin) {
            let request = JSON.parse(localStorage.getItem("currentAdminRequest")) || {};
            request.items = Array.isArray(request.items) ? request.items : [];
            let exist2 = request.items.find(i => i.name === child.name);

            if (exist2) exist2.qty += 1;
            else request.items.push({ name: child.name, price: child.price, qty: 1, img: parent.img });

            localStorage.setItem("currentAdminRequest", JSON.stringify(request));
            alert(`Добавлено: ${child.name}`);

            if (window.opener && typeof window.opener.refreshAdminUI === "function") {
                window.opener.refreshAdminUI();
            }
        }

        window.close();
    }
}

function showProductDetails(parentIndex, childIndex) {
    toggleMenuBtn(false);
    const warehouse = JSON.parse(localStorage.getItem(warehouseKey)) || [];
    const child = warehouse[parentIndex].children[childIndex];
    const parent = warehouse[parentIndex];

    let infoTableHTML = '<table>';
    if (child.info) {
        child.info.split('\n').forEach(line => {
            if (!line.trim()) return;
            const parts = line.split(':');
            if (parts.length >= 2) infoTableHTML += `<tr><td>${parts[0]}</td><td>${parts.slice(1).join(':')}</td></tr>`;
            else infoTableHTML += `<tr><td colspan="2">${line}</td></tr>`;
        });
    } else infoTableHTML += '<tr><td colspan="2">Информация отсутствует</td></tr>';
    infoTableHTML += '</table>';

    grid.innerHTML = `
    <div class="details-container">
        <div class="image"><img src="${child.img || parent.img}"></div>
        <div class="info">
            <p><strong>Название:</strong> ${child.name}</p>
            <p><strong>В наличии:</strong> ${child.qty}</p>
            <p><strong>Информация:</strong></p>
            ${infoTableHTML}
            <button onclick="handleAction(${parentIndex}, ${childIndex})">
                ${fromIndex ? "Оставить заявку" : "Выбрать"}
            </button>
        </div>
    </div>
    <button class="back-btn" onclick="showChildren(${parentIndex})">Назад</button>`;
}

loadWarehouse();
</script>

</body>
</html>
