<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 900px;
            margin: 0 auto;
        }
        .request {
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .request h3 {
            margin: 0;
            font-size: 18px;
        }
        .request p {
            margin: 5px 0;
        }
        .request img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 5px;
        }
        .status {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Ваши заявки</h2>
        <div id="requestsList"></div>
    </div>

    <script>
        // Функция для загрузки данных из файла JSON с сервера
        async function loadRequests() {
            let requestsData = [];

            // Пробуем загрузить данные с сервера
            try {
                const response = await fetch('/path/to/requests_all.json');
                if (response.ok) {
                    requestsData = await response.json();
                } else {
                    console.error('Ошибка загрузки с сервера:', response.statusText);
                }
            } catch (error) {
                console.error('Ошибка загрузки:', error);
            }

            renderRequests(requestsData); // Рендерим данные
        }

        // Функция для рендеринга заявок
        function renderRequests(requestsData) {
            const requestsList = document.getElementById("requestsList");
            requestsList.innerHTML = ""; // Очищаем контейнер перед добавлением новых данных

            // Проверяем, есть ли заявки для отображения
            if (requestsData.length === 0) {
                requestsList.innerHTML = "<p>Заявок нет.</p>";
                return;
            }

            // Отображаем заявки
            requestsData.forEach(request => {
                const requestDiv = document.createElement("div");
                requestDiv.className = "request";
                requestDiv.innerHTML = `
                    <h3>Заявка от ${request.lastname} ${request.firstname}</h3>
                    <p><strong>Дата:</strong> ${request.date}</p>
                    <p><strong>Тип работы:</strong> ${request.type}</p>
                    <p><strong>Статус:</strong> <span class="status">${request.status}</span></p>
                    <p><strong>Адрес:</strong> ${request.address}</p>
                    <p><strong>Телефон:</strong> ${request.phone}</p>
                    <p><strong>E-mail:</strong> ${request.email}</p>
                    <p><strong>Ожидаемое время звонка:</strong> ${request.expectedCallTime}</p>
                    <p><strong>Дата завершения:</strong> ${request.completionDate || 'Не завершено'}</p>
                    
                    <h4>Предметы</h4>
                    <div>
                        ${request.items.map(item => `
                            <div>
                                <img src="${item.img}" alt="${item.name}">
                                <span>${item.name} (x${item.qty})</span>
                            </div>
                        `).join('')}
                    </div>
                `;
                requestsList.appendChild(requestDiv);
            });
        }

        // Загружаем и отображаем заявки при загрузке страницы
        loadRequests();
    </script>
</body>
</html>
