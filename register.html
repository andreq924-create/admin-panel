<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="favicon.png" type="image/png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e2a38, #2f3f52);
            color: #fff;
        }

        header {
            background-color: #1e2a38;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
        }

        nav a:hover {
            color: #FFD700;
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 140px);
        }

        form {
            background: #fff;
            color: #000;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        form input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        form input:focus {
            border-color: #FFD700;
        }

        form button {
            margin-top: 10px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #FFD700;
            cursor: pointer;
            font-weight: bold;
        }

        form button:hover {
            background-color: #FFC300;
        }

        footer {
            background: #000;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }

        /* МОДАЛКА */
        #modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
        }

        #modalBox {
            background: #fff;
            color: #000;
            padding: 25px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        #modalBox.success {
            border-top: 6px solid #28a745;
        }

        #modalBox.error {
            border-top: 6px solid #dc3545;
        }

        #modalBox button {
            margin-top: 15px;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            background: #FFD700;
            cursor: pointer;
            font-weight: bold;
        }

        #modalBox button:hover {
            background: #FFC300;
        }
    </style>
</head>
<body>

<header>
    <h1>Регистрация</h1>
    <nav>
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="login.html">Войти</a></li>
        </ul>
    </nav>
</header>

<main>
    <form id="registerForm">
        <label>Имя пользователя:</label>
        <input type="text" id="regUsername" required>

        <label>Пароль:</label>
        <input type="password" id="regPassword" required>

        <button type="submit">Зарегистрироваться</button>
    </form>
</main>

<footer>
    <p>&copy; 2026 МКУ "Кировсвет". Все права защищены.</p>
</footer>

<!-- МОДАЛЬНОЕ ОКНО -->
<div id="modal">
    <div id="modalBox">
        <div id="modalText"></div>
        <button onclick="closeModal()">Ок</button>
    </div>
</div>

<script>
const registerForm = document.getElementById('registerForm');

function showModal(message, type = "success") {
    const modal = document.getElementById('modal');
    const box = document.getElementById('modalBox');
    const text = document.getElementById('modalText');

    text.innerText = message;

    box.classList.remove('success', 'error');
    box.classList.add(type);

    modal.style.display = "flex";
}

function closeModal() {
    document.getElementById('modal').style.display = "none";
}

registerForm.addEventListener('submit', async function(event) {
    event.preventDefault();

    const regUsername = document.getElementById('regUsername').value;
    const regPassword = document.getElementById('regPassword').value;

    if (!regUsername || !regPassword) {
        showModal('Пожалуйста, заполните все поля!', 'error');
        return;
    }

    const newUser = {
        username: regUsername,
        password: regPassword
    };

    try {
        let users = JSON.parse(localStorage.getItem('users')) || [];

        const existingUser = users.find(user => user.username === regUsername);

        if (existingUser) {
            showModal('Пользователь уже существует!', 'error');
            return;
        }

        users.push(newUser);

        const response = await fetch('/api/updateUsers', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ users: users })
        });

        const result = await response.json();

        if (!response.ok) {
            showModal('Ошибка: ' + (result.error || 'Неизвестная ошибка'), 'error');
            return;
        }

        localStorage.setItem('users', JSON.stringify(users));

        showModal('Регистрация успешна!', 'success');

        setTimeout(() => {
            window.location.href = "login.html";
        }, 1500);

    } catch (err) {
        console.error(err);
        showModal('Ошибка соединения с сервером', 'error');
    }
});
</script>

</body>
</html>
