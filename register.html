<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e2a38, #2f3f52);
            color: #fff;
        }

        header {
            background-color: #1e2a38;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
        }

        nav a:hover {
            color: #FFD700;
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 140px);
        }

        form {
            background: #fff;
            color: #000;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        form input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        form input:focus {
            border-color: #FFD700;
        }

        form button {
            margin-top: 10px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #FFD700;
            cursor: pointer;
            font-weight: bold;
        }

        form button:hover {
            background-color: #FFC300;
        }

        footer {
            background: #000;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }

        /* Стили для уведомления */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #2f3f52;
            color: #fff;
            padding: 20px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.4s ease;
            z-index: 9999;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast button {
            background-color: #FFD700;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
        }

        .toast button:hover {
            background-color: #FFC300;
        }

        .toast .close-btn {
            background: none;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>Регистрация</h1>
    <nav>
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="login.html">Войти</a></li>
        </ul>
    </nav>
</header>

<main>
    <form id="registerForm">
        <label>Имя пользователя:</label>
        <input type="text" id="regUsername" required>

        <label>Пароль:</label>
        <input type="password" id="regPassword" required>

        <button type="submit">Зарегистрироваться</button>
    </form>
</main>

<footer>
    <p>&copy; 2026 МКУ "Кировсвет". Все права защищены.</p>
</footer>

<!-- Панель уведомления -->
<div id="toast" class="toast">
    <span>Вы зарегистрированы!</span>
    <div>
        <button id="loginBtn">Войти</button>
        <button class="close-btn" id="closeToast">&times;</button>
    </div>
</div>

<script>
const registerForm = document.getElementById('registerForm');
const toast = document.getElementById('toast');
const loginBtn = document.getElementById('loginBtn');
const closeToast = document.getElementById('closeToast');

registerForm.addEventListener('submit', async function(event) {
    event.preventDefault();

    const regUsername = document.getElementById('regUsername').value;
    const regPassword = document.getElementById('regPassword').value;

    if (!regUsername || !regPassword) {
        alert('Пожалуйста, заполните все поля!');
        return;
    }

    const newUser = { username: regUsername, password: regPassword };

    try {
        let users = JSON.parse(localStorage.getItem('users')) || [];
        const existingUser = users.find(user => user.username === regUsername);

        if (existingUser) {
            alert('Пользователь с таким именем уже зарегистрирован.');
            return;
        }

        users.push(newUser);

        const response = await fetch('/api/updateUsers', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ users: users })
        });

        const result = await response.json();

        if (!response.ok) {
            alert('Ошибка: ' + (result.error || 'Неизвестная ошибка'));
            return;
        }

        localStorage.setItem('users', JSON.stringify(users));

        // Показываем красивое уведомление
        toast.classList.add('show');

    } catch (err) {
        console.error(err);
        alert('Ошибка соединения с сервером');
    }
});

// Кнопка "Войти"
loginBtn.addEventListener('click', () => {
    window.location.href = 'login.html';
});

// Крестик закрытия
closeToast.addEventListener('click', () => {
    toast.classList.remove('show');
});

// Автоматическое скрытие через 5 секунд
setInterval(() => {
    if (toast.classList.contains('show')) {
        toast.classList.remove('show');
    }
}, 5000);
</script>

</body>
</html>
