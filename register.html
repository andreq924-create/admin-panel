<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
</head>
<body>

<h2>Регистрация</h2>

<form id="registerForm">
    <input type="text" id="regUsername" placeholder="Логин" required>
    <input type="password" id="regPassword" placeholder="Пароль" required>
    <button type="submit">Зарегистрироваться</button>
</form>

<script>
const TOKEN = 'ТВОЙ_GITHUB_TOKEN'; // ⚠️ виден всем
const REPO = 'andreq924-create/admin-panel';
const FILE_PATH = 'users.json';

// Получить файл и SHA
async function getFile() {
    const res = await fetch(
        `https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`,
        {
            headers: {
                Authorization: `Bearer ${TOKEN}`
            }
        }
    );

    return await res.json();
}

// Сохранить файл
async function updateFile(users, sha) {
    return fetch(
        `https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`,
        {
            method: 'PUT',
            headers: {
                Authorization: `Bearer ${TOKEN}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                message: 'update users',
                content: btoa(JSON.stringify(users, null, 2)),
                sha: sha
            })
        }
    );
}

// Форма
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('regUsername').value;
    const password = document.getElementById('regPassword').value;

    const newUser = { username, password };

    try {
        // 1. Получаем текущий файл
        const file = await getFile();

        // 2. Декодируем
        const content = atob(file.content);
        const users = JSON.parse(content);

        // 3. Добавляем пользователя
        users.push(newUser);

        // 4. Обновляем файл
        await updateFile(users, file.sha);

        alert('Успешно зарегистрирован!');
        window.location.href = 'login.html';

    } catch (err) {
        console.error(err);
        alert('Ошибка регистрации');
    }
});
</script>

</body>
</html>
