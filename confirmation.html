<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подтверждение заявки</title>

<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    margin: 0;
    padding: 0;
    color: #fff;
}

/* Центрирование */
.container {
    max-width: 750px;
    width: 92%;
    margin: 50px auto;
    padding: 35px;
    border-radius: 16px;
    background: rgba(36, 52, 79, 0.9);
    backdrop-filter: blur(10px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    animation: fadeIn 0.6s ease;
}

/* Анимация появления */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

h2 {
    color: #FFD700;
    margin-bottom: 10px;
    font-size: 28px;
}

/* Подзаголовок */
.subtitle {
    color: #ccc;
    font-size: 14px;
    margin-bottom: 25px;
}

/* Информация */
.info-section {
    text-align: left;
}

.info-section p {
    margin: 10px 0;
    font-size: 16px;
    padding: 8px 12px;
    background: #1e2a38;
    border-radius: 8px;
    border-left: 3px solid #FFD700;
}

/* Лейблы */
.label {
    font-weight: bold;
    color: #FFD700;
}

/* Товары */
.items {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
}

.item-card {
    background: linear-gradient(145deg, #1e2a38, #26374f);
    padding: 12px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.item-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}

.item-card img {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid #555;
}

.item-card div {
    font-size: 14px;
}

/* Кнопка */
button {
    margin-top: 25px;
    padding: 14px 30px;
    cursor: pointer;
    background: linear-gradient(135deg, #4CAF50, #2e7d32);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 25px rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div class="container">
    <h2>✔ Заявка успешно отправлена</h2>
    <div class="subtitle">Мы получили вашу заявку и скоро с вами свяжемся</div>

    <div class="info-section" id="info"></div>

    <button onclick="goHome()">Вернуться в главное меню</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const rawData = params.get("data");

if (!rawData) {
    document.getElementById("info").innerHTML = "<p>Ошибка: данные не переданы</p>";
} else {

    const data = JSON.parse(decodeURIComponent(rawData));
    const infoDiv = document.getElementById("info");

    let workTypeName = "";
    if (data.type === "both") workTypeName = "Установка столбов и светильников";
    else if (data.type === "repair") workTypeName = "Ремонт повреждения электрических сетей";
    else workTypeName = data.type;

    let html = `
        <p><span class="label">ФИО:</span> ${data.lastname} ${data.firstname}</p>
        <p><span class="label">Телефон:</span> ${data.phone}</p>
        <p><span class="label">Email:</span> ${data.email}</p>
        <p><span class="label">Адрес:</span> ${data.address}</p>
        <p><span class="label">Тип работы:</span> ${workTypeName}</p>
    `;

    if (data.problemDescription) {
        html += `<p><span class="label">Описание:</span> ${data.problemDescription}</p>`;
    }

    if (data.items && data.items.length > 0) {
        html += `<div class="items">`;

        data.items.forEach(item => {
            html += `
                <div class="item-card">
                    <img src="${item.img}">
                    <div>
                        ${item.name}<br>
                        <b>${item.qty} шт.</b>
                    </div>
                </div>
            `;
        });

        html += `</div>`;
    } else {
        html += `<p style="margin-top:15px;">Товары не выбраны</p>`;
    }

    infoDiv.innerHTML = html;
}

function goHome() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
