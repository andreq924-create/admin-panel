<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Освещение - Тёмная тема</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 30px;
    background: linear-gradient(135deg, #1c1c1c, #2a2a2a);
    color: #eee;
    box-sizing: border-box;
    position: relative;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 2.5rem;
    color: #FFD700;
}

/* =========================
   FIX: СТРОГО 4 КОЛОНКИ
========================= */

.grid,
.size-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    width: 100%;
}

/* 🔥 ВАЖНЫЙ FIX: заставляет дочернюю сетку занимать всю ширину */
.grid > .size-grid {
    grid-column: 1 / -1;
    width: 100%;
}

/* защита от сжатия контента */
.grid .card,
.size-grid .card {
    width: 100%;
    min-width: 0;
}

/* =========================
   CARD
========================= */

.card {
    background-color: #2f2f2f;
    border: 1px solid #444;
    border-radius: 12px;
    overflow: hidden;
    text-align: left;
    cursor: pointer;
    position: relative;
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    border-color: #FFD700;
}

.card img {
    width: 100%;
    height: 280px;
    object-fit: contain;
    background-color: #1c1c1c;
    border-bottom: 1px solid #444;
}

.card h3 {
    margin: 12px;
    font-size: 1.3rem;
    color: #FFD700;
}

/* количество */
.qty-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #FFD700;
    color: #000;
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 16px;
    font-weight: bold;
}

/* =========================
   КНОПКИ
========================= */

button {
    margin-top: 20px;
    padding: 12px 25px;
    background-color: #FFD700;
    color: #000;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background-color: #FFC300;
}

button.back-btn {
    position: absolute;
    top: 10px;
    left: 10px;
    background-color: #28a745;
    color: #fff;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
    z-index: 10;
}

button.back-btn:hover {
    background-color: #218838;
}

/* =========================
   ДЕТАЛИ
========================= */

.details-container {
    display: flex;
    flex-direction: row;
    gap: 40px;
    margin-top: 20px;
    align-items: flex-start;
    flex-wrap: nowrap;
    justify-content: flex-start;
    margin-left: 30px;
}

.details-container .image {
    width: 550px;
    flex: 0 0 550px;
}

.details-container .image img {
    width: 100%;
    height: 400px;
    object-fit: contain;
    display: block;
    border-radius: 12px;
    border: 1px solid #444;
}

.details-container .info {
    width: 600px;
    flex: 0 0 600px;
    padding: 20px 15px;
    background-color: #2f2f2f;
    border: 1px solid #444;
    border-radius: 12px;
}

.details-container table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

.details-container td:first-child {
    width: 180px;
    font-weight: bold;
    color: #FFD700;
}

/* =========================
   АДАПТИВ
========================= */

@media (max-width: 1200px) {
    .grid,
    .size-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media (max-width: 900px) {
    .grid,
    .size-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 600px) {
    .grid,
    .size-grid {
        grid-template-columns: 1fr;
    }

    .details-container {
        flex-direction: column;
        align-items: center;
        margin-left: 0;
    }

    .details-container .image,
    .details-container .info {
        width: 100%;
        flex: none;
    }

    .details-container .image img {
        height: auto;
        max-height: 300px;
    }
}

/* =========================
   МОДАЛКА
========================= */

.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(12px);
    background: rgba(0,0,0,0.75);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.hidden {
    display: none;
}

.modal-content {
    background: rgba(47,47,47,0.9);
    border: 1px solid rgba(255, 215, 0, 0.3);
    padding: 30px 25px;
    border-radius: 16px;
    text-align: center;
    color: #eee;
    width: 340px;
}

.modal-content h3 {
    color: #FFD700;
    margin-bottom: 10px;
    font-size: 26px;
}

.modal-content p {
    font-size: 18px;
    color: #ccc;
}

.modal-buttons {
    margin-top: 20px;
    display: flex;
    gap: 12px;
}

.modal-buttons button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.modal-buttons button:first-child {
    background: #444;
    color: #fff;
}

.modal-buttons button:last-child {
    background: #FFD700;
    color: #000;
}

.close-btn {
    position: absolute;
    top: 12px;
    right: 14px;
    cursor: pointer;
    font-size: 20px;
    color: #aaa;
}

.close-btn:hover {
    color: #fff;
}


/* ===== АНИМАЦИИ ===== */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes scaleIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

@keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-30px); }
    to { opacity: 1; transform: translateX(0); }
}

@keyframes slideInRight {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
}

@keyframes popIn {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
}

/* ===== ПРИМЕНЕНИЕ ===== */
.grid .card,
.size-grid .card {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.5s forwards;
}

.grid .card:nth-child(1) { animation-delay: 0.05s; }
.grid .card:nth-child(2) { animation-delay: 0.1s; }
.grid .card:nth-child(3) { animation-delay: 0.15s; }
.grid .card:nth-child(4) { animation-delay: 0.2s; }

.qty-badge {
    animation: popIn 0.5s ease;
}

.details-container {
    animation: fadeIn 0.5s ease;
}

.details-container .image {
    animation: slideInLeft 0.5s ease;
}

.details-container .info {
    animation: slideInRight 0.5s ease;
}

.modal {
    animation: fadeIn 0.3s ease;
}

.modal-content {
    animation: scaleIn 0.3s ease;
}
</style>
</head>

<body>

<h2>Освещение</h2>

<button id="menuBtn" class="back-btn" onclick="goToMenu()">Главное меню</button>

<div class="grid" id="grid"></div>

<!-- МОДАЛКА -->
<div id="authModal" class="modal hidden">
    <div class="modal-content">
        <span class="close-btn" onclick="closeAuthModal()">✖</span>
        <h3>Требуется авторизация</h3>
        <p>Чтобы оставить заявку, нужно войти или зарегистрироваться</p>

        <div class="modal-buttons">
            <button onclick="goToRegister()">Зарегистрироваться</button>
            <button onclick="goToLogin()">Войти</button>
        </div>
    </div>
</div>

<script>
// — твой скрипт без изменений, только handleAction исправлена
const warehouseKey = 'warehouse';
const grid = document.getElementById("grid");
const urlParams = new URLSearchParams(window.location.search);
const isAdmin = urlParams.get('forAdmin') === '1';
const fromIndex = urlParams.get('from') === 'index';

let currentLights = [];

function goToMenu() {
    window.location.href = "index.html";
}

function toggleMenuBtn(show) {
    document.getElementById("menuBtn").style.display = show ? "block" : "none";
}

function isUserLoggedIn() {
    return sessionStorage.getItem("username") !== null;
}

function openAuthModal() {
    document.getElementById("authModal").classList.remove("hidden");
}

function closeAuthModal() {
    document.getElementById("authModal").classList.add("hidden");
}

function goToLogin() {
    window.location.href = "login.html";
}

function goToRegister() {
    window.location.href = "register.html";
}

async function loadWarehouse() {
    try {
        const response = await fetch('./warehouse.json');
        const data = await response.json();
        localStorage.setItem(warehouseKey, JSON.stringify(data));
        loadGrid();
    } catch {
        const warehouseLS = localStorage.getItem(warehouseKey);
        if (warehouseLS) loadGrid();
        else alert("Данные недоступны!");
    }
}

function loadGrid() {
    toggleMenuBtn(true);

    const warehouse = JSON.parse(localStorage.getItem(warehouseKey)) || [];
    currentLights = warehouse.filter(item => item.category === 'light');
    grid.innerHTML = '';

    document.querySelector('h2').textContent = 'Освещение';

    currentLights.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<img src="${item.img}"><h3>${item.name}</h3>`;
        card.onclick = () => showChildren(index);
        grid.appendChild(card);
    });
}

function showChildren(parentIndex) {
    toggleMenuBtn(false);

    const parent = currentLights[parentIndex];
    const children = parent.children || [];

    let html = `<div class="size-grid">`;

    children.forEach((child, childIndex) => {
        html += `
        <div class="card" onclick="showProductDetails(${parentIndex}, ${childIndex})">
            <img src="${child.img || parent.img}">
            <h3>${child.name}</h3>
            <span class="qty-badge">${child.qty}</span>
        </div>`;
    });

    html += `</div><button class="back-btn" onclick="loadGrid()">Назад</button>`;
    grid.innerHTML = html;
}

function showProductDetails(parentIndex, childIndex) {
    toggleMenuBtn(false);

    const parent = currentLights[parentIndex];
    const child = parent.children[childIndex];

    let infoTableHTML = '<table>';

    if (child.info) {
        child.info.split('\n').forEach(line => {
            if (!line.trim()) return;
            const parts = line.split(':');
            if (parts.length >= 2) {
                infoTableHTML += `<tr><td>${parts[0]}</td><td>${parts.slice(1).join(':')}</td></tr>`;
            } else {
                infoTableHTML += `<tr><td colspan="2">${line}</td></tr>`;
            }
        });
    } else {
        infoTableHTML += '<tr><td colspan="2">Информация отсутствует</td></tr>';
    }

    infoTableHTML += '</table>';

    grid.innerHTML = `
    <div class="details-container">
        <div class="image"><img src="${child.img || parent.img}"></div>
        <div class="info">
            <p><strong>Название:</strong> ${child.name}</p>
            <p><strong>В наличии:</strong> ${child.qty}</p>
            <p><strong>Информация:</strong></p>
            ${infoTableHTML}
            <button onclick="handleAction(${parentIndex}, ${childIndex})">
                ${fromIndex ? "Оставить заявку" : "Выбрать"}
            </button>
        </div>
    </div>
    <button class="back-btn" onclick="showChildren(${parentIndex})">Назад</button>`;
}

// — ИСПРАВЛЕННАЯ handleAction
function handleAction(parentIndex, childIndex) {
    const parent = currentLights[parentIndex];
    if (!parent) return alert("Ошибка: родительский элемент не найден");

    const child = parent.children?.[childIndex];
    if (!child) return alert("Ошибка: дочерний элемент не найден");

    if (fromIndex) {
        if (!isUserLoggedIn()) {
            openAuthModal();
            return;
        }

        localStorage.setItem("requestItem", JSON.stringify({
            name: child.name,
            price: child.price,
            img: child.img || parent.img
        }));

        window.location.href = "submit_request.html";
    } else {
        if (child.qty < 1) {
            alert("Нет в наличии");
            return;
        }

        let selected = JSON.parse(localStorage.getItem("selectedItems")) || [];
        let exist = selected.find(i => i.name === child.name);

        if (exist) exist.qty += 1;
        else selected.push({ name: child.name, price: child.price, qty: 1, img: parent.img });

        localStorage.setItem("selectedItems", JSON.stringify(selected));

if (isAdmin) {
    let request = JSON.parse(localStorage.getItem("currentAdminRequest")) || {};
    request.items = Array.isArray(request.items) ? request.items : [];

    let exist2 = request.items.find(i => i.name === child.name);

    if (exist2) exist2.qty += 1;
    else request.items.push({ name: child.name, price: child.price, qty: 1, img: parent.img });

    localStorage.setItem("currentAdminRequest", JSON.stringify(request));
    alert(`Добавлено: ${child.name}`);

    // 🔹 Автоматическое обновление админки
    if (window.opener && typeof window.opener.refreshAdminUI === "function") {
        window.opener.refreshAdminUI();
    }
}

        window.close();
        loadGrid();
    }
}

loadWarehouse();
</script>

</body>
</html>
