<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="favicon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e2a38, #2f3f52);
            color: #fff;
        }

        header {
            background-color: #1e2a38;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
        }

        nav a:hover {
            color: #FFD700;
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 140px);
        }

        .form-container {
            background: #fff;
            color: #000;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        form input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        form input:focus {
            border-color: #FFD700;
        }

        form button {
            margin-top: 10px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #FFD700;
            cursor: pointer;
            font-weight: bold;
        }

        form button:hover {
            background-color: #FFC300;
        }

        footer {
            background: #000;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }

        /* МОДАЛКА */
        #modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
        }

        #modalBox {
            background: #fff;
            color: #000;
            padding: 25px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        #modalBox.success {
            border-top: 6px solid #28a745;
        }

        #modalBox.error {
            border-top: 6px solid #dc3545;
        }

        #modalBox button {
            margin-top: 15px;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            background: #FFD700;
            cursor: pointer;
            font-weight: bold;
        }

        #modalBox button:hover {
            background: #FFC300;
        }
    </style>
</head>

<body>

<header>
    <h1>Вход</h1>
    <nav>
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="register.html">Регистрация</a></li>
        </ul>
    </nav>
</header>

<main>
    <div class="form-container">
        <form id="loginForm">
            <label>Имя пользователя:</label>
            <input type="text" id="username" required>

            <label>Пароль:</label>
            <input type="password" id="password" required>

            <button type="submit">Войти</button>
        </form>
    </div>
</main>

<footer>
    <p>&copy; 2026 МКУ "Кировсвет". Все права защищены.</p>
</footer>

<!-- МОДАЛЬНОЕ ОКНО -->
<div id="modal">
    <div id="modalBox">
        <div id="modalText"></div>
        <button onclick="closeModal()">Ок</button>
    </div>
</div>

<script>
const loginForm = document.getElementById('loginForm');

// модалка
function showModal(message, type = "error") {
    const modal = document.getElementById('modal');
    const box = document.getElementById('modalBox');
    const text = document.getElementById('modalText');

    text.innerText = message;

    box.classList.remove('success', 'error');
    box.classList.add(type);

    modal.style.display = "flex";
}

function closeModal() {
    document.getElementById('modal').style.display = "none";
}

// Загружаем пользователей
let users = [];

window.addEventListener('load', async () => {
    try {
        const response = await fetch('./users.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('Ошибка загрузки users.json');

        users = await response.json();
    } catch (error) {
        console.error(error);
        showModal('Ошибка загрузки пользователей', 'error');
    }
});

loginForm.addEventListener('submit', (event) => {
    event.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    // дефолт
    if (username === '111' && password === '111') {
        sessionStorage.setItem('username', username);
        window.location.href = "user_dashboard.html";
        return;
    }

    // админ
    if (username === 'Admin' && password === 'Admin') {
        sessionStorage.setItem('username', username);
        window.location.href = "admin_dashboard.html";
        return;
    }

    const user = users.find(u => u.username === username && u.password === password);

    if (user) {
        sessionStorage.setItem('username', user.username);
        window.location.href = "user_dashboard.html";
    } else {
        showModal('Неверный логин или пароль!', 'error');
    }
});
</script>

</body>
</html>
