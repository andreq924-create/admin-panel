<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e2a38, #2f3f52);
            color: #fff;
        }

        header {
            background-color: #1e2a38;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
        }

        nav a:hover {
            color: #FFD700;
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 140px);
        }

        .form-container {
            background: #fff;
            color: #000;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        form input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        form input:focus {
            border-color: #FFD700;
        }

        form button {
            margin-top: 10px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #FFD700;
            cursor: pointer;
            font-weight: bold;
        }

        form button:hover {
            background-color: #FFC300;
        }

        #error {
            text-align: center;
            margin-top: 10px;
            color: red;
            display: none;
        }

        footer {
            background: #000;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    <h1>Вход</h1>
    <nav>
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="register.html">Регистрация</a></li>
        </ul>
    </nav>
</header>

<main>
    <div class="form-container">
        <form id="loginForm">
            <label>Имя пользователя:</label>
            <input type="text" id="username" required>

            <label>Пароль:</label>
            <input type="password" id="password" required>

            <button type="submit">Войти</button>
        </form>

        <div id="error">Неверный логин или пароль!</div>
    </div>
</main>

<footer>
    <p>&copy; 2026 МКУ "Кировсвет". Все права защищены.</p>
</footer>

<script>
const loginForm = document.getElementById('loginForm');
const errorMessage = document.getElementById('error');

// Загружаем пользователей один раз при загрузке страницы
let users = [];

window.addEventListener('load', async () => {
    try {
        const response = await fetch('./users.json', { cache: 'no-store' }); // отключаем кеш
        if (!response.ok) throw new Error('Ошибка загрузки users.json');

        users = await response.json();
    } catch (error) {
        console.error(error);
        alert('Ошибка загрузки пользователей');
    }
});

loginForm.addEventListener('submit', (event) => {
    event.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    // дефолт пользователь
    if (username === '111' && password === '111') {
        sessionStorage.setItem('username', username);
        window.location.href = "user_dashboard.html";
        return;
    }

    // админ
    if (username === 'Admin' && password === 'Admin') {
        sessionStorage.setItem('username', username);
        window.location.href = "admin_dashboard.html";
        return;
    }

    // проверяем пользователя из users.json
    const user = users.find(u => u.username === username && u.password === password);

    if (user) {
        sessionStorage.setItem('username', user.username);
        window.location.href = "user_dashboard.html";
    } else {
        errorMessage.style.display = 'block';
    }
});
</script>

</body>
</html>
