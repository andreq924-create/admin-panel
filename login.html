<!DOCTYPE html>
<html lang="ru">

<head>
    <link rel="icon" href="favicon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>

    <style>
        /* Ваши стили остаются прежними */
        :root {
            --bg-1: #1e2a38;
            --bg-2: #2f3f52;
            --card-border: rgba(255, 255, 255, 0.10);
            --text-muted: #d7deea;
            --accent: #FFD700;
            --accent-hover: #FFC300;
            --success: #28a745;
            --error: #dc3545;
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.42);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top left, rgba(255, 215, 0, 0.10), transparent 22%),
                        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.06), transparent 22%),
                        linear-gradient(135deg, var(--bg-1), var(--bg-2));
            color: #fff;
            min-height: 100vh;
        }

        header {
            background-color: rgba(30, 42, 56, 0.96);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.18);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        header h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 0.2px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            transition: color 0.2s ease, opacity 0.2s ease;
        }

        nav a:hover {
            color: #FFD700;
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 140px);
            padding: 28px 16px;
        }

        .form-container {
            width: min(100%, 480px);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .form-title {
            margin: 0;
            text-align: center;
            font-size: 28px;
            line-height: 1.1;
            letter-spacing: 0.2px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.18);
        }

        .form-subtitle {
            margin: 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
        }

        form {
            background: rgba(255, 255, 255, 0.98);
            color: #000;
            padding: 32px;
            border-radius: 18px;
            width: 100%;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 14px;
            border: 1px solid var(--card-border);
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        form label {
            font-size: 14px;
            font-weight: 700;
            color: #111827;
        }

        form input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
            background: #fff;
            font-size: 15px;
        }

        form input:focus {
            border-color: #FFD700;
            box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.14);
        }

        form button {
            margin-top: 10px;
            padding: 13px 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #FFD700, #FFC300);
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.18);
            transition: transform 0.2s ease, filter 0.2s ease, opacity 0.2s ease;
        }

        form button:hover {
            background: linear-gradient(135deg, #ffe24d, #ffc300);
            transform: translateY(-1px);
        }

        footer {
            background: #000;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }

        /* МОДАЛКА */
        #modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 1000;
        }

        #modalBox {
            background: #fff;
            color: #000;
            padding: 25px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            border-top: 6px solid transparent;
        }

        #modalBox.success {
            border-top: 6px solid #28a745;
        }

        #modalBox.error {
            border-top: 6px solid #dc3545;
        }

        #modalBox button {
            margin-top: 15px;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            background: #FFD700;
            cursor: pointer;
            font-weight: bold;
        }

        #modalBox button:hover {
            background: #FFC300;
        }
    </style>
</head>

<body>

<header>
    <h1>Вход</h1>
    <nav>
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="register.html">Регистрация</a></li>
        </ul>
    </nav>
</header>

<main>
    <div class="form-container">
        <h2 class="form-title">Добро пожаловать!</h2>
 
        <form id="loginForm" autocomplete="off" novalidate>
            <div class="field">
                <label for="username">Имя пользователя:</label>
                <input type="text" id="username" required>
            </div>

            <div class="field">
                <label for="password">Пароль:</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit" id="submitBtn">Войти</button>
        </form>
    </div>
</main>

<footer>
    <p>&copy; 2026 МКУ "Кировсвет". Все права защищены.</p>
</footer>

<!-- МОДАЛЬНОЕ ОКНО -->
<div id="modal">
    <div id="modalBox">
        <div id="modalText"></div>
        <button type="button" id="closeModalBtn">Ок</button>
    </div>
</div>

<script>
    const loginForm = document.getElementById('loginForm');
    const closeModalBtn = document.getElementById('closeModalBtn');
    
    let failedAttempts = parseInt(sessionStorage.getItem('failedAttempts')) || 0;
    let blockTime = parseInt(sessionStorage.getItem('blockTime')) || 0;

    // Модалка для отображения ошибок
    function showModal(message, type = "error") {
        const modal = document.getElementById('modal');
        const box = document.getElementById('modalBox');
        const text = document.getElementById('modalText');

        text.innerText = message;

        box.classList.remove('success', 'error');
        box.classList.add(type);

        modal.style.display = "flex";
    }

    // Закрытие модалки
    function closeModal() {
        document.getElementById('modal').style.display = "none";
    }

    // Загружаем пользователей из users.json
    let users = [];
    let usersLoaded = false;

    window.addEventListener('load', async () => {
        try {
            const res = await fetch('users.json');
            if (!res.ok) throw new Error('Не удалось загрузить users.json');
            users = await res.json();
            usersLoaded = true;
            console.log('Users loaded:', users);
        } catch (e) {
            console.error('Ошибка загрузки users.json:', e);
            showModal('Не удалось загрузить users.json', 'error');
        }
    });

    // Логика входа с ограничением
    loginForm.addEventListener('submit', (event) => {
        event.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        // Проверка на пустые данные
        if (!username || !password) {
            showModal('Пожалуйста, заполните все поля!', 'error');
            return;
        }

        // Проверка, загрузился ли JSON
        if (!usersLoaded) {
            showModal('Пользователи ещё загружаются, попробуйте через секунду', 'error');
            return;
        }

        const currentTime = Date.now();

        // Проверка на блокировку
        if (blockTime > currentTime) {
            const remainingTime = Math.floor((blockTime - currentTime) / 1000);
            showModal(`Вы заблокированы на ${remainingTime} секунд!`, 'error');
            return;
        }

        // Сбросить неудачные попытки после блокировки
        if (blockTime <= currentTime && failedAttempts >= 5) {
            failedAttempts = 0;
            sessionStorage.setItem('failedAttempts', failedAttempts);
        }

        // Проверка на дефолтного пользователя
        if (username === '111' && password === '111') {
            sessionStorage.setItem('username', username);
            window.location.href = "user_dashboard.html";
            return;
        }

        // Проверка на админа
        if (username === 'Admin' && password === 'Admin') {
            sessionStorage.setItem('username', username);
            window.location.href = "admin_dashboard.html";
            return;
        }

        // Проверка пользователей из users.json
        const user = users.find(u => u.username === username && u.password === password);

        if (user) {
            sessionStorage.setItem('username', user.username);
            window.location.href = "user_dashboard.html";
        } else {
            failedAttempts++;
            sessionStorage.setItem('failedAttempts', failedAttempts);

            if (failedAttempts >= 5) {
                blockTime = currentTime + 10000; // блокировка на 10 секунд
                sessionStorage.setItem('blockTime', blockTime);
                showModal('Превышено количество попыток! Блокировка на 10 секунд.', 'error');
            } else {
                showModal('Неверный логин или пароль!', 'error');
            }
        }
    });

    closeModalBtn.addEventListener('click', closeModal);
</script>

</body>

</html>
